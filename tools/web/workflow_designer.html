// Lightweight static checks surfaced as a "!" badge on the node — catches the two
// mistakes that silently break a flow: an image node with no template picked, and
// a block that has no incoming wire (so the run never reaches it).
function wfNodeWarnings(n, def, g){
  const w=[];
  for(const f of (def.fields||[])){
    if(f.t==="tpl" && !String(n.params[f.k]||"").trim()) w.push("Chưa chọn ảnh template");
    if(f.t==="tpls"){ const a=n.params[f.k]; if(!Array.isArray(a)||!a.filter(x=>String(x||"").trim()).length) w.push("Chưa có ảnh nào trong danh sách"); }
  }
  if(n.type==="switch"){
    const cs=(n.params&&n.params.cases)||[];
    if(!cs.length) w.push("Chưa có nhánh nào");
    cs.forEach((c,i)=>{ const cd=WF_NODES[c.type]; (cd&&cd.fields||[]).forEach(f=>{
      if(f.t==="tpl" && !String((c.params||{})[f.k]||"").trim()) w.push(`Nhánh #${i+1}: chưa chọn ảnh`); }); });
  }
  if(def.kind!=="start" && def.kind!=="note" && g && !(g.edges||[]).some(ed=>ed.to===n.id))
    w.push("Chưa nối dây vào — block này sẽ không bao giờ chạy");
  return w;
}
function wfNodeEl(n){
  const def=WF_NODES[n.type]||{label:n.type,ico:"?",kind:"action",outs:["out"],fields:[]};
  const el=document.createElement("div");
  // Category tint (only for the bulk action/condition blocks — structural kinds
  // start/end/stop/loop/call/note keep their own distinct styling).
  const catCls = (def.kind==="action"||def.kind==="condition") && def.cat ? " cat-"+def.cat : "";
  // Nodes with true/false outputs show "T"/"F" labels in the top-right corner;
  // flag them so the header reserves room and the title can't slide under the labels.
  const tfCls = ((def.outs||[]).includes("true") || n.type==="switch") ? " has-tf" : "";
  el.className="wf-node "+def.kind+catCls+tfCls+(WF.sel.includes(n.id)?" sel":"")+(n.id===wfRunNode?" running":"");
  el.style.left=n.x+"px"; el.style.top=n.y+"px"; el.dataset.node=n.id;
  // Switch has dynamic output ports (one per case + default) — grow the card so
  // they all sit inside it (ports stack at top = 9 + i*19).
  if(n.type==="switch"){
    const portCount=((n.params&&n.params.cases)||[]).length+1;
    el.style.minHeight=(9 + (portCount-1)*19 + 16)+"px";
  }
  // Merged-block membership: hide the join port at the joined edge and flatten
  // that corner so the stack reads as one block.
  const intIn = n.stack ? wfHasInternalIn(n) : false;
  const intOut = n.stack ? wfHasInternalOut(n) : false;
  if(n.stack){ el.classList.add("wf-stacked");
    if(intIn) el.classList.add("wf-stk-jtop"); if(intOut) el.classList.add("wf-stk-jbot"); }
  // A call node shows the referenced function's name as its title.
  let title=def.label, sum="";
  if(n.type==="call"){ const fn=wfFnById(n.params.fn); title=fn?("ƒ "+fn.name):"ƒ (thiếu)"; }
  else { try{ sum=def.sum?def.sum(n.params):""; }catch{} }
  const tplField = wfTplField(n.type);
  const isTpls = tplField && tplField.t==="tpls";
  const hasTpl = !!tplField;
  const showThumb = hasTpl && (wfPreviewAll || n.showPreview);
  const eyeBtn = hasTpl ? `<button class="wf-node-eye${n.showPreview?" on":""}" title="Xem trước ảnh (block này)">👁</button>` : "";
  const noteHtml = n.note ? `<div class="wf-node-note">${escHtml(n.note)}</div>` : "";
  const logHtml = n.log ? `<div class="wf-node-log">${escHtml(n.log)}</div>` : "";
  // tpls → a strip of small thumbnails (one per listed image); single tpl → one.
  const thumbHtml = showThumb ? (isTpls
    ? `<div class="wf-node-thumbs"></div>`
    : `<img class="wf-node-thumb">`) : "";
  el.innerHTML=
    `<div class="wf-node-hd"><span class="ico">${def.ico}</span>${eyeBtn}<span class="wf-node-title">${escHtml(title)}</span></div>`+
    (sum?`<div class="wf-node-sum">${escHtml(sum)}</div>`:"")+noteHtml+logHtml+thumbHtml;
  if(!sum && !n.note && !n.log && !thumbHtml) el.classList.add("collapsed");
  if(thumbHtml){
    el.classList.add("has-thumb");
    if(isTpls){
      const strip=el.querySelector(".wf-node-thumbs");
      const arr=Array.isArray(n.params[tplField.k])?n.params[tplField.k].filter(p=>String(p||"").trim()):[];
      if(!arr.length){ const e=document.createElement("span"); e.className="wf-tpl-empty"; e.textContent="(chưa có ảnh)"; strip.appendChild(e); }
      arr.forEach(p=>{ const im=document.createElement("img"); im.className="wf-node-thumb-sm"; strip.appendChild(im); wfLoadThumb(im,p); });
    } else {
      wfLoadThumb(el.querySelector(".wf-node-thumb"), wfTplOf(n));
    }
  }
  // input ports (start has none; note floats).
  // Most nodes have a single 'in'; the loop also exposes a 'loop' (loop-back)
  // input below it so the wire that re-enters the loop lands on its own port.
  if(def.kind!=="start" && def.kind!=="note" && !intIn){
    const ins=wfIns(n.type);
    ins.forEach((port,i)=>{
      const top = ins.length<=1 ? 9 : 9 + i*21;
      const ip=document.createElement("span");
      ip.className="wf-port in"+(port==="loop"?" loop":"");
      ip.dataset.node=n.id; ip.dataset.port=port; ip.style.top=top+"px";
      el.appendChild(ip);
      if(ins.length>1){ const lbl=document.createElement("span"); lbl.className="wf-port-lbl in"+(port==="loop"?" loop":"");
        lbl.style.top=(top+1)+"px"; lbl.textContent=WF_IN_LBL[port]||port; el.appendChild(lbl); }
    });
  }
  // output ports (hidden when this member feeds the next block in its stack).
  // Switch builds its ports from the case list: c0..c{n-1} + default.
  let outs;
  if(intOut) outs=[];
  else if(n.type==="switch") outs=((n.params&&n.params.cases)||[]).map((_,i)=>"c"+i).concat(["default"]);
  else outs=(def.outs||[]);
  outs.forEach((port,i)=>{
    const top = outs.length<=1 ? 9 : 9 + i*19;
    const op=document.createElement("span");
    op.className="wf-port out"+(port==="true"?" t":port==="false"?" f":"");
    op.dataset.node=n.id; op.dataset.port=port; op.style.top=top+"px";
    el.appendChild(op);
    let lblTxt;
    if(n.type==="switch") lblTxt = (port==="default") ? "khác" : "#"+(i+1);
    // Parallel's "done" port is the JOIN point — wait all branches, then continue.
    else lblTxt = (n.type==="parallel"&&port==="done") ? "gộp" : WF_PORT_LBL[port];
    if(lblTxt){ const lbl=document.createElement("span"); lbl.className="wf-port-lbl"; lbl.style.top=(top+1)+"px"; lbl.textContent=lblTxt; el.appendChild(lbl); }
  });
  // Validation badge (missing template / not wired in) so broken flows show before a run.
  const warns=wfNodeWarnings(n,def,wfGraph());
  if(warns.length){ el.classList.add("has-warn");
    const b=document.createElement("span"); b.className="wf-node-warn"; b.textContent="!"; b.title=warns.join("\n"); el.appendChild(b); }
  // interactions — the whole node body is a drag handle (ports excluded inside wfStartMove).
  // Deletion is via Delete/Backspace or the right-click menu — no per-node × button.
  el.addEventListener("mousedown",e=>wfStartMove(e,n));
  // Double-click a call node → jump into that function's graph.
  if(n.type==="call"){ el.addEventListener("dblclick",e=>{ e.stopPropagation(); if(n.params&&n.params.fn&&wfFnById(n.params.fn)) wfEditFunction(n.params.fn); }); }
  const eye=el.querySelector(".wf-node-eye");
  if(eye){ eye.addEventListener("mousedown",e=>e.stopPropagation()); eye.addEventListener("click",e=>{ e.stopPropagation(); n.showPreview=!n.showPreview; wfRenderCanvas(); }); }
  el.querySelectorAll(".wf-port.out").forEach(p=>p.addEventListener("mousedown",e=>wfStartConnect(e,n.id,p.dataset.port)));
  // Connection completion is handled globally (drop anywhere on a node = connect).
  return el;
}

// ── Switch-node case edits: keep outgoing wires attached as ports c0.. shift ──
function wfRemoveSwitchCase(node, idx){
  const g=wfGraph(); if(!g) return;
  node.params.cases.splice(idx,1);
  g.edges = g.edges.filter(e=>!(e.from===node.id && e.fromPort==="c"+idx));   // drop the removed case's wire
  g.edges.forEach(e=>{ if(e.from===node.id && /^c\d+$/.test(e.fromPort)){
    const j=parseInt(e.fromPort.slice(1)); if(j>idx) e.fromPort="c"+(j-1); } });   // shift higher cases down
}
function wfReorderSwitchCase(node, from, to){
  const cs=node.params.cases, n=cs.length;
  if(from<0||from>=n||to<0||to>=n||from===to) return;
  // Derive old→new index map by applying the same move to an index array.
  const ord=[]; for(let i=0;i<n;i++) ord.push(i);
  const [m]=ord.splice(from,1); ord.splice(to,0,m);
  const newIndexOf={}; ord.forEach((oldIdx,newIdx)=>{ newIndexOf[oldIdx]=newIdx; });
  const [moved]=cs.splice(from,1); cs.splice(to,0,moved);
  const g=wfGraph(); if(!g) return;
  g.edges.forEach(e=>{ if(e.from===node.id && /^c\d+$/.test(e.fromPort)){
    const old=parseInt(e.fromPort.slice(1));
    if(newIndexOf[old]!==undefined) e.fromPort="c"+newIndexOf[old]; } });
}

// ── Selection ────────────────────────────────────────────────────────────────
function wfMarkSel(){ document.querySelectorAll(".wf-node").forEach(el=>el.classList.toggle("sel",WF.sel.includes(el.dataset.node))); }
function wfSelectOne(id){ WF.sel=id?[id]:[]; WF.selectedNode=id||null; }
function wfToggleSel(id){ const i=WF.sel.indexOf(id); if(i>=0)WF.sel.splice(i,1); else WF.sel.push(id); WF.selectedNode=WF.sel.length?id:null; }
function wfClearSel(){ WF.sel=[]; WF.selectedNode=null; }
function wfDeleteNode(id){ wfDeleteNodes([id]); }
function wfDeleteSelected(){ if(WF.sel.length) wfDeleteNodes(WF.sel.slice()); }
function wfDeleteNodes(ids){
  const g=wfGraph(); if(!g) return;
  const del=ids.filter(id=>{ const n=g.nodes.find(x=>x.id===id); return n && n.type!=="start"; });
  if(!del.length) return;
  g.nodes=g.nodes.filter(n=>!del.includes(n.id));
  g.edges=g.edges.filter(e=>!del.includes(e.from)&&!del.includes(e.to));
  // A merge with only one block left is no longer a stack — dissolve it.
  const stackCount={}; g.nodes.forEach(n=>{ if(n.stack) stackCount[n.stack]=(stackCount[n.stack]||0)+1; });
  g.nodes.forEach(n=>{ if(n.stack && stackCount[n.stack]<2) n.stack=null; });
  WF.sel=WF.sel.filter(id=>!del.includes(id));
  if(del.includes(WF.selectedNode)) WF.selectedNode=null;
  wfRenderCanvas(); wfRenderInspector();
}

// ── Copy / paste ──────────────────────────────────────────────────────────────
// Clipboard holds detached clones of the copied nodes (params, note, stacking)
// plus the edges *internal* to the selection, referenced by array index so they
// survive id remapping. Works across activities/functions (it's not tied to the
// current graph). The 'start' node is never copyable.
let wfClipboard=null;
let wfPasteShift=0;            // cascade offset for repeated Ctrl+V at no cursor
let wfPointer={x:0,y:0,inside:false};   // last pointer pos over the canvas
function wfCopy(){
  const g=wfGraph(); if(!g) return false;
  const ids=WF.sel.filter(id=>{ const n=g.nodes.find(x=>x.id===id); return n && n.type!=="start"; });
  if(!ids.length) return false;
  const idset=new Set(ids);
  const nodes=ids.map(id=>{ const n=g.nodes.find(x=>x.id===id);
    return { type:n.type, x:n.x, y:n.y, note:n.note||"", log:n.log||"", showPreview:!!n.showPreview,
      stack:n.stack||null, params:JSON.parse(JSON.stringify(n.params||{})) }; });
  const edges=g.edges.filter(e=>idset.has(e.from)&&idset.has(e.to))
    .map(e=>({fromIdx:ids.indexOf(e.from), fromPort:e.fromPort, toIdx:ids.indexOf(e.to), toPort:e.toPort||"in"}));
  const minX=Math.min(...nodes.map(n=>n.x)), minY=Math.min(...nodes.map(n=>n.y));
  wfClipboard={nodes,edges,minX,minY};
  wfPasteShift=0;
  setStatus(`Đã sao chép ${nodes.length} node`);
  return true;
}
function wfCut(){ if(wfCopy()) wfDeleteSelected(); }
function wfDuplicate(){ if(wfCopy()) wfPaste(); }   // copy + cascade-offset paste
function wfPaste(opts){
  const g=wfGraph(); if(!g){ alert("Chọn hoặc thêm một hoạt động trước."); return; }
  if(!wfClipboard||!wfClipboard.nodes.length) return;
  const clip=wfClipboard;
  let dx, dy;
  if(opts && opts.clientX!==undefined){
    const wr=$("wf-world").getBoundingClientRect();
    dx=wfSnap((opts.clientX-wr.left)/wfZoom - clip.minX - 70);
    dy=wfSnap((opts.clientY-wr.top)/wfZoom - clip.minY - 14);
  } else { wfPasteShift+=24; dx=wfPasteShift; dy=wfPasteShift; }
  const newIds=clip.nodes.map(()=>wfUid());
  const stackMap={};   // remap copied stack ids → fresh ids so paste stays its own merge
  clip.nodes.forEach((n,i)=>{
    const node=wfNewNode(n.type, n.x+dx, n.y+dy);
    node.id=newIds[i];
    node.params=JSON.parse(JSON.stringify(n.params||{}));
    node.note=n.note||""; node.log=n.log||""; node.showPreview=!!n.showPreview;
    if(n.stack){ stackMap[n.stack]=stackMap[n.stack]||wfStackId(); node.stack=stackMap[n.stack]; }
    g.nodes.push(node);
  });
  clip.edges.forEach(e=>g.edges.push({from:newIds[e.fromIdx], fromPort:e.fromPort, to:newIds[e.toIdx], toPort:e.toPort||"in"}));
  // A partially-copied stack (only some members) can leave a lone tagged node —
  // drop the tag so it isn't a one-block "merge".
  const stkCnt={}; g.nodes.forEach(n=>{ if(n.stack) stkCnt[n.stack]=(stkCnt[n.stack]||0)+1; });
  g.nodes.forEach(n=>{ if(n.stack && stkCnt[n.stack]<2) n.stack=null; });
  WF.sel=newIds.slice(); WF.selectedNode=newIds.length===1?newIds[0]:null;
  wfRenderCanvas(); wfMarkSel(); wfRenderInspector();
  setStatus(`Đã dán ${newIds.length} node`);
}

// ── Wires ────────────────────────────────────────────────────────────────────
function wfPortPt(nodeId,port){
  let el;
  if(port==="in"||port==="loop"){
    el=document.querySelector(`.wf-node[data-node="${nodeId}"] .wf-port.in[data-port="${port}"]`);
    // Fall back to the node's first input (e.g. a 'loop' edge whose target is no
    // longer a loop node) so the wire still anchors somewhere sensible.
    if(!el) el=document.querySelector(`.wf-node[data-node="${nodeId}"] .wf-port.in`);
  }
  else{
    el=document.querySelector(`.wf-node[data-node="${nodeId}"] .wf-port.out[data-port="${port}"]`);
    // Legacy/loose: if that exact out port is gone (e.g. a node that became a
    // condition), anchor on the node's first output port so the wire still shows.
    if(!el) el=document.querySelector(`.wf-node[data-node="${nodeId}"] .wf-port.out`);
  }
  if(!el) return null;
  const wr=$("wf-world").getBoundingClientRect(), r=el.getBoundingClientRect();
  // Wires are drawn inside the (scaled) world → convert screen delta to world units.
  return { x:(r.left+r.width/2-wr.left)/wfZoom, y:(r.top+r.height/2-wr.top)/wfZoom };
}
// Arrowhead markers, one per wire colour (CSS picks the right one via marker-end).
// Re-inserted on every full redraw because wfDrawWires clears the <svg>.
const WF_WIRE_DEFS = (function(){
  const mk=(id,c)=>`<marker id="${id}" markerWidth="9" markerHeight="9" refX="6.6" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="${c}"/></marker>`;
  return "<defs>"+mk("wf-ah","#9aa9bd")+mk("wf-ah-h","#bb3a33")+mk("wf-ah-t","#2fa55a")
    +mk("wf-ah-f","#cf6b43")+mk("wf-ah-loop","#e0a64b")+mk("wf-ah-temp","#2f6fed")+"</defs>";
})();
function wfBezier(a,b){
  // Forward edge (target to the right): smooth horizontal S-curve.
  if(b.x >= a.x-20){ const dx=Math.max(40,Math.abs(b.x-a.x)*0.5); return `M${a.x},${a.y} C${a.x+dx},${a.y} ${b.x-dx},${b.y} ${b.x},${b.y}`; }
  // Backward edge (e.g. loop wire-back, target to the left): bow downward so it
  // arcs around the nodes instead of cutting straight through them.
  const off=Math.max(50, Math.abs(b.x-a.x)*0.25);
  const bow=Math.max(70, Math.abs(b.y-a.y)*0.4 + 60);
  return `M${a.x},${a.y} C${a.x+off},${a.y+bow} ${b.x-off},${b.y+bow} ${b.x},${b.y}`;
}
function wfDrawWires(){
  const svg=$("wf-wires"), g=wfGraph();
  const temp=svg.querySelector(".temp");
  svg.innerHTML=WF_WIRE_DEFS; if(temp) svg.appendChild(temp);
  if(!g) return;
  const NS="http://www.w3.org/2000/svg";
  g.edges.forEach(ed=>{
    // Edges inside a merged block are implicit (the blocks sit flush) — don't draw.
    if(wfSameStack(ed.from, ed.to)) return;
    const toPort = ed.toPort||"in";
    const a=wfPortPt(ed.from,ed.fromPort), b=wfPortPt(ed.to,toPort);
    if(!a||!b) return;
    const d=wfBezier(a,b);
    // Group a fat invisible hit-path with the visible wire: the group carries the
    // edge ref (right-click to delete) and widens the hover target generously.
    const grp=document.createElementNS(NS,"g"); grp.setAttribute("class","wire-grp"); grp.__edge=ed;
    const hit=document.createElementNS(NS,"path"); hit.setAttribute("class","wire-hit"); hit.setAttribute("d",d);
    const tt=document.createElementNS(NS,"title"); tt.textContent="Chuột phải để xoá dây nối"; hit.appendChild(tt);
    const p=document.createElementNS(NS,"path");
    p.setAttribute("class","wire"+(ed.fromPort==="true"?" t":ed.fromPort==="false"?" f":"")+(toPort==="loop"?" loopback":""));
    p.dataset.from=ed.from; p.dataset.fromport=ed.fromPort; p.dataset.to=ed.to;  // for run-trail branch colouring
    p.setAttribute("d", d);
    grp.appendChild(hit); grp.appendChild(p);
    svg.appendChild(grp);
  });
}
function wfDeleteWire(ed){
  const g=wfGraph(); if(!g||!ed) return;
  const i=g.edges.indexOf(ed); if(i>=0) g.edges.splice(i,1);
  wfRenderCanvas();
}
function wfDrawTempWire(mx,my){
  const a=wfPortPt(wfGesture.from,wfGesture.port); if(!a) return;
  const wr=$("wf-world").getBoundingClientRect();
  const b={ x:(mx-wr.left)/wfZoom, y:(my-wr.top)/wfZoom };
  const svg=$("wf-wires"); let t=svg.querySelector(".temp");
  if(!t){ t=document.createElementNS("http://www.w3.org/2000/svg","path"); t.setAttribute("class","temp"); svg.appendChild(t); }
  t.setAttribute("d",wfBezier(a,b));
}
function wfClearTemp(){ const t=$("wf-wires").querySelector(".temp"); if(t)t.remove(); }

// ── Groups (frames) ───────────────────────────────────────────────────────────
// A group is a named rectangle living in the graph (graph.groups). Membership is
// geometric: a node belongs to a group when its centre is inside the rectangle.
// Moving the group's header moves every node currently inside it. Groups are
// purely visual — the engine ignores them (it only runs nodes + edges).
const WF_GROUP_COLORS = [
  {b:"#6f9be8", bg:"rgba(111,155,232,.07)"},
  {b:"#2fb0a3", bg:"rgba(47,176,163,.08)"},
  {b:"#e0954b", bg:"rgba(224,149,75,.09)"},
  {b:"#9a78e6", bg:"rgba(154,120,230,.08)"},
  {b:"#cf6b6b", bg:"rgba(207,107,107,.08)"},
];
function wfGroups(){ const t=wfEditTarget(); if(!t) return []; if(!t.graph.groups) t.graph.groups=[]; return t.graph.groups; }
function wfGroupColor(gr){ return WF_GROUP_COLORS[(gr.color||0) % WF_GROUP_COLORS.length]; }
function wfNodesInGroup(gr){
  const g=wfGraph(); if(!g) return [];
  return g.nodes.filter(n=>{
    const el=document.querySelector(`.wf-node[data-node="${n.id}"]`);
    const w=el?el.offsetWidth:158, h=el?el.offsetHeight:52;
    const cx=n.x+w/2, cy=n.y+h/2;
    return cx>=gr.x && cx<=gr.x+gr.w && cy>=gr.y && cy<=gr.y+gr.h;
  });
}
function wfAddGroup(x,y,w,h){
  const groups=wfGroups();
  const gr={ id:"g"+wfUid().slice(1), name:"Nhóm "+(groups.length+1),
    x:Math.round(x), y:Math.round(y), w:Math.round(w), h:Math.round(h), color:groups.length%WF_GROUP_COLORS.length };
  groups.push(gr); wfRenderCanvas(); setStatus(`Đã tạo "${gr.name}" — kéo tiêu đề để di chuyển cả nhóm`);
  return gr;
}
function wfDeleteGroup(id){ const groups=wfGroups(); const i=groups.findIndex(x=>x.id===id); if(i>=0){ groups.splice(i,1); wfRenderCanvas(); } }
function wfRenameGroup(gr){ const nm=prompt("Tên nhóm:", gr.name||""); if(nm!==null){ gr.name=(nm.trim()||gr.name); wfRenderCanvas(); } }
// Create a group hugging the current multi-selection (toolbar button shortcut).
function wfGroupSelection(){
  const ids=WF.sel.slice(); if(ids.length<1) return false;
  let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
  ids.forEach(id=>{ const n=wfNode(id); if(!n) return;
    const el=document.querySelector(`.wf-node[data-node="${id}"]`);
    const w=el?el.offsetWidth:158, h=el?el.offsetHeight:52;
    x0=Math.min(x0,n.x); y0=Math.min(y0,n.y); x1=Math.max(x1,n.x+w); y1=Math.max(y1,n.y+h);
  });
  if(!isFinite(x0)) return false;
  const pad=22;
  wfAddGroup(x0-pad, y0-pad-22, (x1-x0)+pad*2, (y1-y0)+pad*2+22);
  return true;
}
function wfRenderGroups(){
  const world=$("wf-world"), svg=$("wf-wires");
  [...world.querySelectorAll(".wf-group")].forEach(el=>el.remove());
  wfGroups().forEach(gr=>{
    const c=wfGroupColor(gr);
    const el=document.createElement("div"); el.className="wf-group"; el.dataset.group=gr.id;
    el.style.left=gr.x+"px"; el.style.top=gr.y+"px"; el.style.width=gr.w+"px"; el.style.height=gr.h+"px";
    el.style.borderColor=c.b; el.style.background=c.bg; el.style.color=c.b;
    el.innerHTML=`<div class="wf-group-hd" style="background:${c.b}"><span class="wf-group-name">${escHtml(gr.name)}</span><button class="wf-group-del" title="Xoá nhóm (giữ lại các node)">×</button></div><div class="wf-group-resize"></div>`;
    world.insertBefore(el, svg);   // behind the wires + nodes
    const hd=el.querySelector(".wf-group-hd");
    hd.addEventListener("mousedown",e=>wfStartGroupMove(e,gr));
    hd.addEventListener("dblclick",e=>{ e.stopPropagation(); wfRenameGroup(gr); });
    const del=el.querySelector(".wf-group-del");
    del.addEventListener("mousedown",e=>e.stopPropagation());
    del.addEventListener("click",e=>{ e.stopPropagation(); wfDeleteGroup(gr.id); });
    el.querySelector(".wf-group-resize").addEventListener("mousedown",e=>wfStartGroupResize(e,gr));
  });
}
function wfStartGroupMove(e,gr){
  if(e.button!==0 || e.target.closest(".wf-group-del")) return;
  e.stopPropagation();
  const members=wfNodesInGroup(gr).map(n=>({id:n.id, ox:n.x, oy:n.y}));
  wfGesture={mode:"groupmove", gr, gx:gr.x, gy:gr.y, sx:e.clientX, sy:e.clientY, members};
}
function wfStartGroupResize(e,gr){
  if(e.button!==0) return; e.stopPropagation();
  wfGesture={mode:"groupresize", gr, ow:gr.w, oh:gr.h, sx:e.clientX, sy:e.clientY};
}

function wfStartMove(e,n){
  if(e.button!==0||e.target.closest(".wf-port,.wf-node-eye")) return;
  e.stopPropagation();
  if(e.shiftKey){ wfToggleSel(n.id); wfMarkSel(); wfRenderInspector(); return; }
  let ids;
  if(WF.sel.length>1 && WF.sel.includes(n.id)){
    ids=WF.sel.slice();              // move the whole multi-selection together
  } else if(n.stack){
    ids=wfStackMembers(n.stack).map(m=>m.id); wfSelectOne(n.id);  // drag a merged block as one
  } else {
    ids=[n.id]; wfSelectOne(n.id);   // single node
  }
  wfMarkSel(); wfRenderInspector();
  const g=wfGraph(); if(!g) return;
  const items=ids.map(id=>{ const nn=g.nodes.find(x=>x.id===id); return nn?{id,ox:nn.x,oy:nn.y}:null; }).filter(Boolean);
  wfGesture={mode:"move",items,sx:e.clientX,sy:e.clientY,dragId:n.id};
}
function wfStartConnect(e,nodeId,port){
  if(e.button!==0) return; e.stopPropagation(); e.preventDefault();
  wfGesture={mode:"connect",from:nodeId,port};
  $("wf-canvas").classList.add("wf-connecting");   // let drops land on nodes, not wires
}
// Loose connect: the drop only has to land *anywhere on the target node*, not
// exactly on its input dot. The node under the pointer becomes the target.
function wfNodeUnderPointer(x,y){
  const el=document.elementFromPoint(x,y); if(!el) return null;
  const node=el.closest(".wf-node"); return node?node.dataset.node:null;
}
function wfHighlightTarget(id){
  document.querySelectorAll(".wf-node").forEach(el=>el.classList.toggle("conn-target", !!id && el.dataset.node===id));
}
// When a node has >1 input (the loop), pick the input port nearest the drop
// point so dropping low on a loop wires into its 'lặp' (loop-back) port.
function wfNearestInPort(nodeId, clientX, clientY){
  const ports=[...document.querySelectorAll(`.wf-node[data-node="${nodeId}"] .wf-port.in`)];
  if(ports.length<=1) return "in";
  let best="in", bestD=Infinity;
  ports.forEach(p=>{ const r=p.getBoundingClientRect();
    const dx=clientX-(r.left+r.width/2), dy=clientY-(r.top+r.height/2), d=dx*dx+dy*dy;
    if(d<bestD){ bestD=d; best=p.dataset.port||"in"; } });
  return best;
}
function wfConnectTo(toNodeId, clientX, clientY){
  const g=wfGraph();
  if(g && wfGesture && wfGesture.from!==toNodeId){
    // Dropping onto any block of a merged stack wires into the stack's head.
    const tn=wfNode(toNodeId);
    if(tn && tn.stack){ const chain=wfStackChain(tn.stack); if(chain.length) toNodeId=chain[0].id; }
    if(wfGesture.from===toNodeId) return false;
    const toPort=wfNearestInPort(toNodeId, clientX, clientY);
    g.edges=g.edges.filter(ed=>!(ed.from===wfGesture.from && ed.fromPort===wfGesture.port)); // one wire per output port
    g.edges.push({from:wfGesture.from,fromPort:wfGesture.port,to:toNodeId,toPort});
    return true;
  }
  return false;
}
function wfCanvasMouseDown(e){
  if(e.target.closest(".wf-node")||e.target.closest(".wf-group")) return;
  // Middle mouse, or Space+left → pan.
  if(e.button===1 || (e.button===0 && wfSpace)){
    e.preventDefault();
    $("wf-canvas").classList.add("panning");
    wfGesture={mode:"pan",sx:e.clientX,sy:e.clientY,ox:wfPan.x,oy:wfPan.y};
    return;
  }
  if(e.button!==0) return;
  const wr=$("wf-world").getBoundingClientRect();
  // Group-draw mode: left-drag on empty canvas draws a new group rectangle.
  if(wfGroupMode){
    const box=document.createElement("div"); box.id="wf-selbox"; box.className="wf-selbox";
    $("wf-world").appendChild(box);
    wfGesture={mode:"groupdraw", sx:(e.clientX-wr.left)/wfZoom, sy:(e.clientY-wr.top)/wfZoom};
    return;
  }
  // Plain left on empty → rubber-band select.
  if(!e.shiftKey) wfClearSel();
  const box=document.createElement("div"); box.id="wf-selbox"; box.className="wf-selbox";
  $("wf-world").appendChild(box);
  wfGesture={mode:"box", sx:(e.clientX-wr.left)/wfZoom, sy:(e.clientY-wr.top)/wfZoom, base:WF.sel.slice()};
  wfMarkSel(); wfRenderInspector();
}
// Group-draw arm state (toolbar ⊞ button). One-shot: drawing a group disarms it.
let wfGroupMode=false;
function wfSetGroupMode(on){
  wfGroupMode=!!on;
  const b=$("wf-group-btn"); if(b){ b.classList.toggle("on",wfGroupMode); b.title="Tạo nhóm: "+(wfGroupMode?"đang bật — kéo để vẽ khung":"Tắt"); }
  const c=$("wf-canvas"); if(c) c.style.cursor=wfGroupMode?"crosshair":"";
}
function wfToggleGroupMode(){
  // If blocks are selected, wrap them in a group right away; else arm draw mode.
  if(!wfGroupMode && WF.sel.length>0){ wfGroupSelection(); return; }
  wfSetGroupMode(!wfGroupMode);
}
// ── Right-click context menu (group / copy / delete) ──────────────────────────
function wfHideMenu(){ const m=$("wf-ctxmenu"); if(m) m.style.display="none"; }
function wfShowMenu(clientX, clientY){
  const m=$("wf-ctxmenu"); if(!m) return;
  const items=[];
  const copyable=WF.sel.filter(id=>{ const n=wfNode(id); return n && n.type!=="start"; }).length;
  const stackSids=[...new Set(WF.sel.map(id=>{ const n=wfNode(id); return n&&n.stack; }).filter(Boolean))];
  if(stackSids.length) items.push({label:"⛓ Bỏ merge", fn:()=>stackSids.forEach(wfUnmerge)});
  if(WF.sel.length>=1) items.push({label:"▢ Tạo nhóm quanh ("+WF.sel.length+")", fn:wfGroupSelection});
  if(copyable){ items.push({label:"⎘ Sao chép ("+copyable+")", fn:wfCopy});
    items.push({label:"✂ Cắt ("+copyable+")", fn:wfCut});
    items.push({label:"⧉ Nhân đôi ("+copyable+")", fn:wfDuplicate}); }
  if(wfClipboard&&wfClipboard.nodes.length) items.push({label:"📋 Dán ("+wfClipboard.nodes.length+")", fn:()=>wfPaste({clientX,clientY})});
  if(WF.sel.length) items.push({label:"🗑 Xoá ("+WF.sel.length+")", fn:()=>wfDeleteSelected()});
  if(!items.length){ wfHideMenu(); return; }
  m.innerHTML="";
  items.forEach(it=>{ const d=document.createElement("div"); d.className="wf-ctx-item"; d.textContent=it.label;
    d.onclick=()=>{ wfHideMenu(); it.fn(); }; m.appendChild(d); });
  const cr=$("wf-canvas").getBoundingClientRect();
  m.style.left=(clientX)+"px"; m.style.top=(clientY)+"px"; m.style.display="block";
}

function wfShowWireMenu(clientX, clientY, ed){
  const m=$("wf-ctxmenu"); if(!m) return;
  m.innerHTML="";
  const d=document.createElement("div"); d.className="wf-ctx-item"; d.textContent="🗑 Xoá dây nối";
  d.onclick=()=>{ wfHideMenu(); wfDeleteWire(ed); }; m.appendChild(d);
  m.style.left=clientX+"px"; m.style.top=clientY+"px"; m.style.display="block";
}
function wfInitCanvas(){
  if(wfCanvasReady) return; wfCanvasReady=true;
  const canvas=$("wf-canvas");
  canvas.addEventListener("mousedown",wfCanvasMouseDown);
  // Track the pointer over the canvas so Ctrl+V pastes under the cursor.
  canvas.addEventListener("mousemove",e=>{ wfPointer.x=e.clientX; wfPointer.y=e.clientY; wfPointer.inside=true; });
  canvas.addEventListener("mouseleave",()=>{ wfPointer.inside=false; });
  canvas.addEventListener("contextmenu",e=>{
    e.preventDefault();
    // Right-click on a wire → offer to delete just that wire.
    const wireGrp=e.target.closest("g.wire-grp");
    if(wireGrp && wireGrp.__edge){ wfShowWireMenu(e.clientX, e.clientY, wireGrp.__edge); return; }
    const ne=e.target.closest(".wf-node");
    if(ne && !WF.sel.includes(ne.dataset.node)){ wfSelectOne(ne.dataset.node); wfMarkSel(); wfRenderInspector(); }
    wfShowMenu(e.clientX, e.clientY);
  });
  document.addEventListener("mousedown",e=>{ if(!e.target.closest("#wf-ctxmenu")) wfHideMenu(); if(!e.target.closest("#wf-globs-pop") && !e.target.closest("#wf-vars-mgr") && !e.target.closest("#wf-vars-add")) wfHideGlobsEditor(); }, true);
  // Vars panel header toggles collapse (click-through to drag is fine on body).
  const vhdr=document.querySelector("#wf-vars-panel .wf-vars-hdr");
  if(vhdr) vhdr.onclick=(e)=>{ if(e.target.closest(".wf-vars-actions")) return; wfVarsCollapsed=!wfVarsCollapsed; wfRenderVarsPanel(); };
  const vadd=$("wf-vars-add");
  if(vadd) vadd.onclick=(e)=>{ e.stopPropagation(); wfAddQuickGlobal(); };
  const vmgr=$("wf-vars-mgr");
  if(vmgr) vmgr.onclick=(e)=>{ e.stopPropagation(); wfToggleGlobsEditor(); };
  canvas.addEventListener("wheel",e=>{
    e.preventDefault();
    const r=canvas.getBoundingClientRect();
    wfSetZoom(wfZoom*(e.deltaY<0?1.1:1/1.1), e.clientX-r.left, e.clientY-r.top);
  }, {passive:false});
  canvas.addEventListener("dragover",e=>{ if(wfPaletteDrag){ e.preventDefault(); e.dataTransfer.dropEffect="copy"; } });
  canvas.addEventListener("drop",e=>{
    if(!wfPaletteDrag) return; e.preventDefault();
    const g=wfGraph(); if(!g){ alert("Chọn hoặc thêm một hoạt động/function trước."); wfPaletteDrag=null; return; }
    const wr=$("wf-world").getBoundingClientRect();
    const x=wfSnap((e.clientX-wr.left)/wfZoom-70), y=wfSnap((e.clientY-wr.top)/wfZoom-14);
    let node;
    if(wfPaletteDrag.startsWith("call:")){ node=wfNewNode("call",x,y); node.params={fn:wfPaletteDrag.slice(5)}; }
    else if(wfPaletteDrag.startsWith("var:")){ const p=wfPaletteDrag.split(":"); const vtype=p[1], vname=p.slice(2).join(":");
      node=wfNewNode("if_var",x,y); node.params={name:vname, op:"==", value: vtype==="bool"?"true":""}; }
    else node=wfNewNode(wfPaletteDrag,x,y);
    g.nodes.push(node); wfSelectOne(node.id); wfPaletteDrag=null;
    wfRenderCanvas(); wfRenderInspector();
  });
  document.addEventListener("mousemove",e=>{
    if(!wfGesture) return;
    if(wfGesture.mode==="move"){
      // Snap the lead node, then shift the whole selection by the SAME delta.
      const lead=wfGesture.items.find(it=>it.id===wfGesture.dragId)||wfGesture.items[0];
      if(!lead) return;
      const sx=wfSnap(lead.ox+(e.clientX-wfGesture.sx)/wfZoom);
      const sy=wfSnap(lead.oy+(e.clientY-wfGesture.sy)/wfZoom);
      const dx=sx-lead.ox, dy=sy-lead.oy;
      wfGesture.items.forEach(it=>{
        const n=wfNode(it.id); if(!n) return;
        n.x=it.ox+dx; n.y=it.oy+dy;
        const el=document.querySelector(`.wf-node[data-node="${n.id}"]`);
        if(el){ el.style.left=n.x+"px"; el.style.top=n.y+"px"; }
      });
      wfDrawWires();
      if(wfGesture.items.length===1) wfShowMergeHint(wfGesture.dragId);  // preview snap target
    } else if(wfGesture.mode==="groupmove"){
      // Move the frame + every node that was inside it when the drag began.
      const gr=wfGesture.gr;
      const dx=(e.clientX-wfGesture.sx)/wfZoom, dy=(e.clientY-wfGesture.sy)/wfZoom;
      gr.x=Math.round(wfGesture.gx+dx); gr.y=Math.round(wfGesture.gy+dy);
      const gel=document.querySelector(`.wf-group[data-group="${gr.id}"]`);
      if(gel){ gel.style.left=gr.x+"px"; gel.style.top=gr.y+"px"; }
      wfGesture.members.forEach(m=>{ const n=wfNode(m.id); if(!n) return; n.x=m.ox+dx; n.y=m.oy+dy;
        const el=document.querySelector(`.wf-node[data-node="${m.id}"]`); if(el){ el.style.left=n.x+"px"; el.style.top=n.y+"px"; } });
      wfDrawWires();
    } else if(wfGesture.mode==="groupresize"){
      const gr=wfGesture.gr;
      gr.w=Math.max(80, Math.round(wfGesture.ow+(e.clientX-wfGesture.sx)/wfZoom));
      gr.h=Math.max(60, Math.round(wfGesture.oh+(e.clientY-wfGesture.sy)/wfZoom));
      const el=document.querySelector(`.wf-group[data-group="${gr.id}"]`);
      if(el){ el.style.width=gr.w+"px"; el.style.height=gr.h+"px"; }
    } else if(wfGesture.mode==="groupdraw"){
      const wr=$("wf-world").getBoundingClientRect();
      const cx=(e.clientX-wr.left)/wfZoom, cy=(e.clientY-wr.top)/wfZoom;
      const x=Math.min(cx,wfGesture.sx), y=Math.min(cy,wfGesture.sy);
      const w=Math.abs(cx-wfGesture.sx), h=Math.abs(cy-wfGesture.sy);
      const box=$("wf-selbox"); if(box){ box.style.left=x+"px"; box.style.top=y+"px"; box.style.width=w+"px"; box.style.height=h+"px"; }
    } else if(wfGesture.mode==="box"){
      wfBoxSelectMove(e);
    } else if(wfGesture.mode==="pan"){
      wfPan.x=wfGesture.ox+(e.clientX-wfGesture.sx);
      wfPan.y=wfGesture.oy+(e.clientY-wfGesture.sy);
      wfApplyTransform();
    } else if(wfGesture.mode==="connect"){
      wfDrawTempWire(e.clientX,e.clientY);
      const tid=wfNodeUnderPointer(e.clientX,e.clientY);
      wfHighlightTarget(tid && tid!==wfGesture.from ? tid : null);
    }
  });
  document.addEventListener("mouseup",e=>{
    if(!wfGesture) return;
    if(wfGesture.mode==="connect"){
      const tid=wfNodeUnderPointer(e.clientX,e.clientY);
      const connected = tid ? wfConnectTo(tid, e.clientX, e.clientY) : false;
      wfClearTemp(); wfHighlightTarget(null);
      // A new wire changes which nodes are "wired in" → rebuild so the warning
      // badges refresh; otherwise just redraw the wires (cheaper, no node change).
      if(connected) wfRenderCanvas(); else wfDrawWires();
    } else if(wfGesture.mode==="groupresize"){
      wfRenderCanvas();
    } else if(wfGesture.mode==="groupdraw"){
      const box=$("wf-selbox"); const gst=wfGesture;
      if(box) box.remove();
      const wr=$("wf-world").getBoundingClientRect();
      const cx=(e.clientX-wr.left)/wfZoom, cy=(e.clientY-wr.top)/wfZoom;
      const x=Math.min(cx,gst.sx), y=Math.min(cy,gst.sy), w=Math.abs(cx-gst.sx), h=Math.abs(cy-gst.sy);
      if(w>40 && h>40) wfAddGroup(x,y,w,h);   // ignore tiny accidental drags
      wfSetGroupMode(false);
    } else if(wfGesture.mode==="box"){
      const box=$("wf-selbox"); if(box) box.remove();
      WF.selectedNode = WF.sel.length===1 ? WF.sel[0] : null;
      wfRenderInspector();
    } else if(wfGesture.mode==="move"){
      // Dropping a single lone block flush above/below another merges them.
      wfClearMergeHint();
      const moved=Math.abs(e.clientX-wfGesture.sx)+Math.abs(e.clientY-wfGesture.sy)>3;
      if(moved && wfGesture.items.length===1) wfTryMerge(wfGesture.dragId);
    } else if(wfGesture.mode==="pan"){
      $("wf-canvas").classList.remove("panning");
    }
    $("wf-canvas").classList.remove("wf-connecting");
    wfGesture=null;
  });
}
function wfBoxSelectMove(e){
  const wr=$("wf-world").getBoundingClientRect();
  const cx=(e.clientX-wr.left)/wfZoom, cy=(e.clientY-wr.top)/wfZoom;
  const x=Math.min(cx,wfGesture.sx), y=Math.min(cy,wfGesture.sy);
  const w=Math.abs(cx-wfGesture.sx), h=Math.abs(cy-wfGesture.sy);
  const box=$("wf-selbox");
  if(box){ box.style.left=x+"px"; box.style.top=y+"px"; box.style.width=w+"px"; box.style.height=h+"px"; }
  const g=wfGraph(); if(!g) return;
  const hit=[];
  g.nodes.forEach(n=>{
    const el=document.querySelector(`.wf-node[data-node="${n.id}"]`); if(!el) return;
    const nw=el.offsetWidth, nh=el.offsetHeight;
    if(n.x < x+w && n.x+nw > x && n.y < y+h && n.y+nh > y) hit.push(n.id);
  });
  WF.sel = wfGesture.base.concat(hit.filter(id=>!wfGesture.base.includes(id)));
  wfMarkSel();
}

// ── Inspector ──────────────────────────────────────────────────────────────
function wfRenderInspector(){
  const body=$("wf-insp-body"); body.innerHTML="";
  wfRenderVarsPanel();   // the vars list depends on the current activity
  // Multi-selection: show a count + bulk delete instead of one node's params.
  if(WF.sel.length>1){
    const h=document.createElement("div"); h.className="wf-insp-sec"; h.textContent=`${WF.sel.length} node được chọn`; body.appendChild(h);
    const btn=document.createElement("button"); btn.className="btn sm err"; btn.textContent="Xoá các node đã chọn";
    btn.onclick=()=>wfDeleteSelected(); body.appendChild(btn);
    const tip=document.createElement("div"); tip.className="wf-insp-empty"; tip.textContent="Kéo một node để di chuyển cả nhóm. Phím Delete để xoá."; body.appendChild(tip);
    return;
  }
  const node=wfNode(WF.selectedNode), act=wfCurAct(), fn=wfCurFn();
  if(node){
    const def=WF_NODES[node.type]||{label:node.type,fields:[]};
    const h=document.createElement("div"); h.className="wf-insp-sec"; h.textContent=`${def.ico||""} ${def.label}`; body.appendChild(h);
    if(node.type==="call"){ body.appendChild(wfCallPicker(node)); }
    else if(node.type==="switch"){ body.appendChild(wfSwitchCasesEditor(node)); }
    else {
      if(!(def.fields||[]).length){ const d=document.createElement("div"); d.className="wf-insp-empty"; d.textContent="Node này không có tham số."; body.appendChild(d); }
      (def.fields||[]).forEach(f=>body.appendChild(wfFieldEl(node,f)));
    }
    // A free-text note for any node (the standalone "note" node carries its own text).
    if(node.type!=="note") body.appendChild(wfNoteField(node));
    // A runtime log line: auto-emitted to the log panel every time this block runs.
    // 'start' never executes, and the "note" node isn't run, so skip both.
    if(node.type!=="note" && node.type!=="start") body.appendChild(wfLogField(node));
    return;
  }
  if(fn){
    const h=document.createElement("div"); h.className="wf-insp-sec"; h.textContent="ƒ Function"; body.appendChild(h);
    body.appendChild(wfActField("Tên","text",fn.name,v=>{ fn.name=v; wfRenderFunctions(); wfRenderPalette(); $("wf-cur-act").textContent="ƒ "+v; }));
    const tip=document.createElement("div"); tip.className="wf-insp-empty"; tip.textContent="Xếp node cho function này. Nó dùng được như một node trong mọi hoạt động (kéo từ mục Function)."; body.appendChild(tip);
    return;
  }
  if(act){
    const h=document.createElement("div"); h.className="wf-insp-sec"; h.textContent=act.type==="background"?"Hoạt động nền":"Hoạt động tuần tự"; body.appendChild(h);
    body.appendChild(wfActField("Tên","text",act.name,v=>{ act.name=v; wfRenderActivities(); $("wf-cur-act").textContent=v; }));
    if(act.type==="background") body.appendChild(wfActField("Chu kỳ (s)","num",act.pollInterval,v=>act.pollInterval=parseFloat(v)||1));
    else body.appendChild(wfActField("Số lần thử","num",act.maxRetries,v=>act.maxRetries=parseInt(v)||1));
    body.appendChild(wfVarsSection(act));
    const tip=document.createElement("div"); tip.className="wf-insp-empty"; tip.textContent="Bấm một node trên canvas để sửa tham số của nó."; body.appendChild(tip);
    return;
  }
  body.innerHTML='<div class="wf-insp-empty">Chưa chọn hoạt động.</div>';
}

function wfFieldEl(node,f){
  const row=document.createElement("div"); row.className="wf-field";
  const lab=document.createElement("label"); lab.textContent=f.lbl||f.k; lab.title=f.k; row.appendChild(lab);
  if(f.t==="bool"){
    const cb=document.createElement("span"); cb.className="cb"+(node.params[f.k]?" checked":"");
    cb.innerHTML='<svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 6.2l2.3 2.3L9.5 3.5"/></svg>';
    cb.onclick=()=>{ node.params[f.k]=!node.params[f.k]; cb.classList.toggle("checked",node.params[f.k]); wfUpdNodeSum(node); };
    row.appendChild(cb); return row;
  }
  if(f.t==="select"){
    const sel=document.createElement("select"); sel.style.flex="1"; sel.style.minWidth="0";

    function renderList(){
      list.innerHTML="";
      arr().forEach((path,idx)=>{
        const item=document.createElement("div");
        item.style.cssText="border:1px solid var(--border2);border-radius:6px;padding:5px;display:flex;flex-direction:column;gap:4px;";
        const r=document.createElement("div"); r.style.cssText="display:flex;align-items:center;gap:4px;";

        const inp=document.createElement("input"); inp.type="text"; inp.value=path||""; inp.style.cssText="flex:1;min-width:0;font-size:10px;";
        const pick=document.createElement("button"); pick.className="btn sm"; pick.textContent="Chọn…";
        const del=document.createElement("button"); del.className="wf-act-del"; del.textContent="×"; del.title="Xoá ảnh";
        const img=document.createElement("img"); img.className="wf-tpl-preview"; wfLoadThumb(img, path);
        const commit=v=>{ arr()[idx]=v; wfUpdNodeSum(node); wfUpdNodePreview(node); wfLoadThumb(img,v); };
        inp.oninput=()=>commit(inp.value);
        pick.onclick=async()=>{ const pp=await api().pick_template(); if(pp){ inp.value=pp; commit(pp); } };
        del.onclick=()=>{ arr().splice(idx,1); wfUpdNodeSum(node); wfUpdNodePreview(node); renderList(); };
        r.appendChild(num); r.appendChild(inp); r.appendChild(pick); r.appendChild(del);
        item.appendChild(r); item.appendChild(img); list.appendChild(item);
      });
      if(!arr().length){ const e=document.createElement("div"); e.className="wf-tpl-empty"; e.textContent="Chưa có ảnh — thêm ít nhất 2 để dùng \"hoặc\"."; list.appendChild(e); }
    }
    renderList();
    const add=document.createElement("button"); add.className="btn sm"; add.textContent="+ Ảnh";
    add.onclick=async()=>{ const pp=await api().pick_template(); arr().push(pp||""); wfUpdNodeSum(node); wfUpdNodePreview(node); renderList(); };
    row.appendChild(list); row.appendChild(add);
    return row;
  }
  // Variable-picker field: a text input backed by a <datalist> of every

      let dl=document.getElementById("wf-varlist");
      if(!dl){ dl=document.createElement("datalist"); dl.id="wf-varlist"; document.body.appendChild(dl); }
      // Rebuild each render so newly-declared vars appear.
      dl.innerHTML=""; names.forEach(n=>{ const o=document.createElement("option"); o.value=n; dl.appendChild(o); });
    }
    return row;
  }
  const inp=document.createElement("input");
  inp.type=f.t==="num"?"number":"text"; if(f.t==="num"&&f.step) inp.step=f.step;
  inp.value=node.params[f.k]!==undefined?node.params[f.k]:"";
  inp.oninput=()=>{ node.params[f.k]= f.t==="num"?(parseFloat(inp.value)||0):inp.value; wfUpdNodeSum(node); };
  row.appendChild(inp);
  if(f.t==="tpl"){
    inp.style.fontSize="10px";
    const btn=document.createElement("button"); btn.className="btn sm"; btn.textContent="Chọn…";
    row.appendChild(btn);
    // Wrap the row + a live preview thumbnail of the chosen image.
    const wrap=document.createElement("div"); wrap.appendChild(row);
    const img=document.createElement("img"); img.className="wf-tpl-preview"; wrap.appendChild(img);
    wfLoadThumb(img, node.params[f.k]);
    const refresh=v=>{ node.params[f.k]=v; wfUpdNodeSum(node); wfLoadThumb(img,v); wfUpdNodePreview(node); };
    inp.oninput=()=>refresh(inp.value);
    btn.onclick=async()=>{ const p=await api().pick_template(); if(p){ inp.value=p; refresh(p); } };
    return wrap;
  }
  return row;
}
// Editor for the "Rẽ nhánh" (switch) node: a list of cases, each a condition of a
// chosen type whose own fields are edited (reusing wfFieldEl via a throwaway proxy
// so its DOM-refresh helpers no-op on the switch node). Add/remove/reorder go
// through the edge-remap helpers so wires stay attached to the right case.
function wfSwitchCasesEditor(node){
  const wrap=document.createElement("div");
  const cases=()=> Array.isArray(node.params.cases)?node.params.cases:(node.params.cases=[]);
  const list=document.createElement("div"); list.style.cssText="display:flex;flex-direction:column;gap:8px;";
  function render(){
    list.innerHTML="";
    cases().forEach((c,idx)=>{
      const item=document.createElement("div");
      item.style.cssText="border:1px solid var(--border2);border-radius:7px;padding:6px;display:flex;flex-direction:column;gap:5px;";
      const hd=document.createElement("div"); hd.style.cssText="display:flex;align-items:center;gap:4px;";
      const num=document.createElement("span"); num.textContent="#"+(idx+1);
      num.style.cssText="font-size:10.5px;font-weight:700;color:var(--accent);flex-shrink:0;";
      const sel=document.createElement("select"); sel.style.cssText="flex:1;min-width:0;font-size:11px;";
      WF_SWITCH_CASE_TYPES.forEach(t=>{ const op=document.createElement("option"); op.value=t;
        op.textContent=(WF_NODES[t].ico||"")+" "+WF_NODES[t].label; if(c.type===t)op.selected=true; sel.appendChild(op); });
      sel.onchange=()=>{ c.type=sel.value; c.params=wfDefaults(sel.value); render(); wfUpdNodeSum(node); };
      const up=document.createElement("button"); up.className="btn sm"; up.textContent="↑"; up.title="Lên"; up.disabled=idx===0;
      up.onclick=()=>{ wfReorderSwitchCase(node, idx, idx-1); render(); wfRenderCanvas(); };
      const dn=document.createElement("button"); dn.className="btn sm"; dn.textContent="↓"; dn.title="Xuống"; dn.disabled=idx===cases().length-1;
      dn.onclick=()=>{ wfReorderSwitchCase(node, idx, idx+1); render(); wfRenderCanvas(); };
      const del=document.createElement("button"); del.className="wf-act-del"; del.textContent="×"; del.title="Xoá nhánh";
      del.onclick=()=>{ wfRemoveSwitchCase(node, idx); render(); wfRenderCanvas(); };
      hd.appendChild(num); hd.appendChild(sel); hd.appendChild(up); hd.appendChild(dn); hd.appendChild(del);
      item.appendChild(hd);
      // Render the chosen condition's fields, edited against c.params. The proxy id
      // doesn't match any DOM node, so wfFieldEl's wfUpdNodeSum/Preview no-op safely.
      const proxy={ id:node.id+"__c"+idx, type:c.type, params:c.params };
      (WF_NODES[c.type].fields||[]).forEach(f=> item.appendChild(wfFieldEl(proxy,f)));
      list.appendChild(item);
    });
    if(!cases().length){ const e=document.createElement("div"); e.className="wf-insp-empty"; e.textContent='Chưa có nhánh. Bấm "+ Nhánh".'; list.appendChild(e); }
  }
  render();
  const add=document.createElement("button"); add.className="btn sm"; add.textContent="+ Nhánh";
  add.onclick=()=>{ cases().push({type:"if_image", params:wfDefaults("if_image")}); render(); wfRenderCanvas(); wfUpdNodeSum(node); };
  const hint=document.createElement("div"); hint.className="wf-insp-empty"; hint.style.marginTop="2px";
  hint.textContent="Kiểm lần lượt từ trên xuống: đúng nhánh nào đi cổng đó (#1..#n), không khớp đi cổng 'khác'.";
  wrap.appendChild(list); wrap.appendChild(add); wrap.appendChild(hint);
  return wrap;
}
function wfUpdNodeSum(node){
  const def=WF_NODES[node.type]; if(!def||!def.sum) return;
  const el=document.querySelector(`.wf-node[data-node="${node.id}"] .wf-node-sum`);
  let s=""; try{ s=def.sum(node.params); }catch{}
  if(el) el.textContent=s;
}

function wfTplField(type){ const def=WF_NODES[type]; return def&&(def.fields||[]).find(f=>f.t==="tpl"||f.t==="tpls"); }
function wfTplOf(node){ const f=wfTplField(node.type); if(!f) return ""; const v=node.params[f.k];
  return Array.isArray(v)?(v.find(Boolean)||""):(v||""); }   // tpls → first set image
function wfUpdNodePreview(node){
  const el=document.querySelector(`.wf-node[data-node="${node.id}"]`);
  if(!el) return;
  const strip=el.querySelector(".wf-node-thumbs");
  if(strip){
    const f=wfTplField(node.type);
    const arr=Array.isArray(node.params[f.k])?node.params[f.k].filter(p=>String(p||"").trim()):[];
    strip.innerHTML="";
    if(!arr.length){ const e=document.createElement("span"); e.className="wf-tpl-empty"; e.textContent="(chưa có ảnh)"; strip.appendChild(e); return; }
    arr.forEach(p=>{ const im=document.createElement("img"); im.className="wf-node-thumb-sm"; strip.appendChild(im); wfLoadThumb(im,p); });
    return;
  }
  const img=el.querySelector(".wf-node-thumb");
  if(img) wfLoadThumb(img, wfTplOf(node));   // refresh single in-node thumbnail if shown
}

function wfCleanGraph(g){
  return {
    nodes:(g.nodes||[]).map(n=>{ const o={id:n.id,type:n.type,x:Math.round(n.x),y:Math.round(n.y),params:n.params}; if(n.note) o.note=n.note; if(n.log) o.log=n.log; if(n.showPreview) o.showPreview=true; if(n.stack) o.stack=n.stack; return o; }),
    edges:(g.edges||[]).map(e=>{ const o={from:e.from,fromPort:e.fromPort,to:e.to}; if(e.toPort&&e.toPort!=="in") o.toPort=e.toPort; return o; }),
    groups:(g.groups||[]).map(gr=>({id:gr.id,name:gr.name,x:Math.round(gr.x),y:Math.round(gr.y),w:Math.round(gr.w),h:Math.round(gr.h),color:gr.color||0})),
  };
}
function wfSerialize(){
  wfSpeedFromUI();
  const sh=WF.speedhack||{enabled:false,speed:2.0,package:""};
  return {
    name:$("wf-name").value||"workflow", version:2, templatesDir:WF.templatesDir||"templates",
    speedhack:{ enabled:!!sh.enabled, speed:sh.speed||2.0, package:(sh.package||"").trim() },
    globals:(WF.globals||[]).map(v=>({name:v.name||"var",label:v.label||"",type:v.type||"bool",value:v.value,options:v.options||[]})),
    functions: WF.functions.map(f=>({ id:f.id, name:f.name, graph:wfCleanGraph(f.graph) })),
    activities: WF.activities.map(a=>{
      const o={ id:a.id, name:a.name, type:a.type, enabled:a.enabled,
        vars:(a.vars||[]).map(v=>({name:v.name,label:v.label||"",type:v.type,value:v.value, options:v.type==="select"?(v.options||[]):undefined})), graph:wfCleanGraph(a.graph) };
      if(a.type==="background") o.pollInterval=a.pollInterval; else o.maxRetries=a.maxRetries;
      return o;
    }),
  };
}
function wfHydrateGraph(g){
  g=g||{nodes:[],edges:[]};
  let nodes=(g.nodes||[]).map(n=>({id:n.id||wfUid(),type:n.type,x:n.x||40,y:n.y||40,params:n.params||wfDefaults(n.type),note:n.note||"",log:n.log||"",showPreview:!!n.showPreview,stack:n.stack||null}));
  if(!nodes.some(n=>n.type==="start")) nodes.unshift({id:wfUid(),type:"start",x:40,y:40,params:{}});
  const groups=(g.groups||[]).map(gr=>({id:gr.id||("g"+wfUid().slice(1)),name:gr.name||"Nhóm",x:gr.x||0,y:gr.y||0,w:gr.w||200,h:gr.h||140,color:gr.color||0}));
  return { nodes, edges:(g.edges||[]).map(e=>({from:e.from,fromPort:e.fromPort||"out",to:e.to,toPort:e.toPort||"in"})), groups };
}
function wfHydrate(flow){
  WF.name=flow.name||"workflow"; WF.version=flow.version||2; WF.templatesDir=flow.templatesDir||"templates";
  const sh=flow.speedhack||{}; WF.speedhack={enabled:!!sh.enabled, speed:(parseFloat(sh.speed)||2.0), package:(sh.package||"").trim()};
  WF.functions=(flow.functions||[]).map(f=>({ id:f.id||("fn_"+wfUid().slice(1,6)), name:f.name||"function", graph:wfHydrateGraph(f.graph) }));
  WF.globals=(flow.globals||[]).map(v=>({name:v.name||"var",label:v.label||"",type:v.type||"bool",value:v.value,options:v.options||[]}));
  WF.activities=(flow.activities||[]).map(a=>({
    id:a.id||("act_"+wfUid().slice(1,5)), name:a.name||a.id||"activity",
    type:a.type==="background"?"background":"sequence", enabled:a.enabled!==false,
    maxRetries:a.maxRetries||1, pollInterval:a.pollInterval||1.0,
    vars:(a.vars||[]).map(v=>({name:v.name||"var",label:v.label||"",type:v.type||"bool",value:v.value,options:v.options||[]})),
    graph:wfHydrateGraph(a.graph),
  }));
  WF.edit={kind:"activity", id:WF.activities[0]?WF.activities[0].id:null}; wfClearSel(); wfPan={x:0,y:0}; wfZoom=1;
  $("wf-name").value=WF.name;
  wfSyncSpeedUI();
  wfRenderAll();
}

async function wfExport(){ await api().workflow_export(JSON.stringify(wfSerialize(),null,2), $("wf-name").value); }
async function wfSave(){
  const r=await api().workflow_save(JSON.stringify(wfSerialize(),null,2), $("wf-name").value);
  if(r&&r.ok) setStatus("Đã lưu workflow");
}
async function wfImport(){
  const txt=await api().workflow_import(); if(!txt)return;
  try{ wfHydrate(JSON.parse(txt)); setStatus("Đã nhập workflow"); }
  catch(e){ alert("JSON không hợp lệ: "+e); }
}
// Play / stop glyphs for the run toggle (icon-only button).
const WF_ICO_PLAY = '<svg viewBox="0 0 24 24"><polygon points="6 4 20 12 6 20 6 4"/></svg>';
const WF_ICO_STOP = '<svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1.5"/></svg>';
function wfSetRunning(on){
  wfRunning=on; const b=$("wf-run-btn");
  // When a run ends (stopped or finished) every block returns to its original
  // colour — no leftover green/red/amber trail.
  if(!on){ wfResetRunViz(); wfLiveVars={}; wfFreshVar=null; }
  if(b){
    b.innerHTML = on?WF_ICO_STOP:WF_ICO_PLAY;
    b.title = on?"Dừng":"Chạy thử";
    b.classList.toggle("ok",!on); b.classList.toggle("err",on);
  }
  wfRenderVarsPanel();
}
async function wfToggleRun(){
  if(wfRunning){ wfSetRunning(false); await api().workflow_stop(); return; }  // reset first, then stop
  if(!WF.activities.length){ alert("Chưa có hoạt động nào."); return; }
  wfResetRunViz();        // clear last run's colours BEFORE the engine starts emitting
  wfSetRunning(true);     // mark running before any node event can arrive
  const ok=await api().workflow_run(JSON.stringify(wfSerialize()));
  if(!ok) wfSetRunning(false);
}
async function wfRunGui(){
  if(!WF.activities.length){ alert("Chưa có hoạt động nào."); return; }
  await api().open_runner(JSON.stringify(wfSerialize()));
  setStatus("Đã mở Runner GUI");
}


// ── Init ──────────────────────────────────────────────────────────────────
async function init(){
  let tries=0;
  while(!(window.pywebview&&window.pywebview.api)&&tries<40){ await new Promise(r=>setTimeout(r,100)); tries++; }
  if(!window.pywebview||!window.pywebview.api){ setStatus("⚠ pywebview không khả dụng"); return; }
  const state=await api().get_state();
  S.connectedSerial=state.connectedSerial||null;
  (state.log||[]).forEach(appendLog);
  try{ const st=await api().get_settings(); wfSnapOn=!!st.snap; wfPreviewAll=!!st.previewAll;
    if(st.logOpen===false){ const lc=$("log-card"); if(lc) lc.classList.add("collapsed"); }
    if(st.sideW){ const sd=$("wf-side"); if(sd) sd.style.width=Math.max(150,Math.min(480,st.sideW))+"px"; } }catch{}
  wfInitSideResizer();
  wfSetupSortable($("wf-activities"));
  if($("wf-functions")) wfSetupSortable($("wf-functions"));
  wfSyncToggleBtns();
  wfSetRunning(false);   // seed the run button's play icon
  updateLogCount();
  wfInitCanvas();
  // Reopen the workflow that was open when the designer last closed.
  let reopened="";
  try{
    const lw=await api().get_last_workflow();
    if(lw && lw.text){ wfHydrate(JSON.parse(lw.text)); reopened=lw.name||"workflow trước"; }
  }catch(e){}
  if(!WF.activities.length) wfAddActivity("sequence");
  wfRenderAll();
  setStatus(reopened ? ("Đã mở lại: "+reopened) : "Sẵn sàng");
}
if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",init); else init();
</script>
