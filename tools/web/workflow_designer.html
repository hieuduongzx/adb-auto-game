<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Workflow2k</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #eef0f3;
  --panel:     #ffffff;
  --surface:   #f7f9fc;
  --alt:       #f3f5f9;
  --border:    #e4e7ec;
  --border2:   #dde2e8;
  --line:      #f1f3f6;
  --ink:       #19222e;
  --ink2:      #41505f;
  --dim:       #5a6573;
  --muted:     #9aa3ae;
  --accent:    #2f6fed;
  --accent-bg: #eef5ff;
  --accent-bd: #d6e4f5;
  --ok:        #1f9254;
  --ok-bg:     #e8f5ed;
  --ok-bd:     #cfead9;
  --warn:      #9c6c12;
  --warn-bg:   #fdf6e9;
  --err:       #bb3a33;
  --err-bg:    #fcefee;
  --err-bd:    #eecdca;
  --log-bg:    #fbfcfd;
  --log-ink:   #41505f;
  --log-muted: #b3bbc4;
  --sans: "IBM Plex Sans","Segoe UI",system-ui,sans-serif;
  --mono: "IBM Plex Mono","Cascadia Code","Consolas",monospace;
  --r-sm: 7px; --r-md: 10px; --r-lg: 14px;
  --node-r: 7px;   /* node card corner — rectangular, only lightly rounded */
  /* 4pt spacing scale — every gap/pad pulls from here for consistent rhythm. */
  --s1: 4px; --s2: 6px; --s3: 8px; --s4: 12px; --s5: 16px; --s6: 24px;
  /* Elevation scale — subtle, reinforces hierarchy (sidebar < panel < node < menu). */
  --sh-sm: 0 1px 2px rgba(20,30,45,.06);
  --sh-md: 0 2px 8px rgba(20,30,45,.08);
  --sh-lg: 0 10px 30px rgba(20,30,45,.16);
  /* Semantic z-index scale — no arbitrary 999s. */
  --z-node: 2; --z-selbox: 1; --z-node-hover: 6; --z-menu: 50; --z-toast: 60;
  --ease: cubic-bezier(0.16,1,0.3,1);
  color-scheme: light;
}
@media (prefers-reduced-motion: reduce){
  *, *::before, *::after { animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important; }
}

html, body { height: 100%; background: var(--bg); font-family: var(--sans);
  font-size: 13px; color: var(--ink); -webkit-font-smoothing: antialiased; }
body { display: flex; flex-direction: column; overflow: hidden; user-select: none; }

button { font-family: var(--sans); font-size: inherit; cursor: pointer;
  border: none; background: none; padding: 0; line-height: 1; color: inherit; }
button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

input, select { font-family: var(--mono); font-size: 11.5px; background: var(--panel);
  color: var(--ink); border: 1px solid var(--border2);
  border-radius: var(--r-sm); padding: 5px 8px; }
input:focus, select:focus { outline: none; border-color: var(--accent); }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d3d9e0; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #b8c1cc; }

/* ── Layout ─────────────────────────────────────────────────────────────── */
#app { flex: 1; display: flex; flex-direction: column; gap: 7px;
  padding: 8px 8px 4px; overflow: hidden; min-height: 0; }
.card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--r-md); box-shadow: var(--sh-sm); }

/* ── Toolbar ────────────────────────────────────────────────────────────── */
#toolbar { padding: var(--s2) var(--s4); display: flex; align-items: center; gap: var(--s4); flex-shrink: 0; }
.tb-group { display: flex; align-items: center; gap: var(--s2); }
.tb-label { font-size: 10.5px; font-weight: 700; letter-spacing: .05em;
  color: var(--muted); text-transform: uppercase; }

.device-wrap { display: flex; align-items: center; gap: 7px; min-width: 250px;
  padding: 5px 10px; border: 1px solid var(--border2); border-radius: 8px; background: var(--panel); }
#device-dot { width: 7px; height: 7px; border-radius: 50%; background: #d3d9e0;
  flex-shrink: 0; transition: background .2s; }
#device-dot.connected { background: #2fa55a; }
#device-select { flex: 1; min-width: 0; border: none; background: transparent;
  font-family: var(--sans); font-size: 12px; font-weight: 500; color: var(--dim);
  cursor: pointer; -webkit-appearance: none; appearance: none; padding: 0; }
#device-select:focus { outline: none; }

.btn { display: inline-flex; align-items: center; justify-content: center; gap: 5px;
  height: 30px; border-radius: 8px; font-weight: 600; font-size: 11.5px;
  transition: background .15s, opacity .15s;
  border: 1px solid var(--border); background: var(--panel); color: var(--dim);
  padding: 0 11px; flex-shrink: 0; }
.btn:hover  { background: var(--alt); }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.accent:hover { background: #2559c7; }
.btn.ok  { background: var(--ok);  color: #fff; border-color: var(--ok);
  box-shadow: 0 1px 2px rgba(31,146,84,.3); font-size: 12px; font-weight: 700; }
.btn.ok:hover  { background: #1b8049; }
.btn.err { border: 1px solid var(--err-bd); background: var(--err-bg); color: var(--err); }
.btn.err:hover { background: #fae2e0; }
.btn.sm  { height: 26px; padding: 0 9px;  font-size: 11px; }
.btn.h30 { height: 30px; padding: 0 12px; }
/* Icon-only toolbar button: square, glyph centered, label lives in the tooltip.
   Keeps the toolbar compact instead of a wall of text. Colour variants
   (.accent/.ok/.err) still apply for primary actions (save / run). */
.btn.ico { width: 30px; padding: 0; }
.btn.sm.ico { width: 26px; }
.btn.ico svg { width: 16px; height: 16px; display: block; }
.btn svg { stroke: currentColor; fill: none; stroke-width: 2;
  stroke-linecap: round; stroke-linejoin: round; }
.btn.accent svg, .btn.ok svg, .btn.err svg { stroke-width: 2.1; }
/* A toggle icon button reads its on/off state from colour, not text. */
.btn.ico.on { background: var(--accent-bg); border-color: var(--accent-bd); color: var(--accent); }

/* Inline icon button */
.icon-btn { width: 26px; height: 26px; border-radius: 5px; border: 1px solid var(--border2);
  background: transparent; color: var(--muted); display: inline-flex; align-items: center;
  justify-content: center; flex-shrink: 0; transition: background .1s, color .1s; }
.icon-btn:hover { background: var(--alt); color: var(--ink); }
.icon-btn.flash { color: var(--ok) !important; }

.hz-wrap { display: flex; align-items: center; gap: 4px; }
#hz-spin  { width: 54px; height: 30px; text-align: right; padding: 0 8px; }
.hz-unit  { font-size: 11px; color: var(--muted); flex-shrink: 0; }

.pill-wrap { display: flex; align-items: center; gap: 7px; cursor: pointer; }
#auto-cb { width: 36px; height: 21px; border-radius: 999px; background: #d3d9e0;
  position: relative; transition: background .2s; flex-shrink: 0; display: block; }
#auto-cb.on { background: var(--accent); }
#auto-thumb { position: absolute; top: 2px; left: 2px; width: 17px; height: 17px;
  border-radius: 50%; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.25); transition: left .2s; }
#auto-cb.on #auto-thumb { left: 17px; }
.pill-label { font-size: 11.5px; font-weight: 600; color: var(--dim); }
.spacer { flex: 1; }

/* ── Main split ──────────────────────────────────────────────────────────── */
#main { flex: 1; display: flex; gap: 7px; min-height: 0; overflow: hidden; }

/* Preview */
#preview-card { flex: 1; display: flex; flex-direction: column;
  background: var(--panel); border: 1px solid var(--border);
  border-radius: var(--r-md); overflow: hidden; min-width: 0; }
.preview-hdr { display: flex; align-items: center; gap: 8px;
  padding: 7px 12px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
#size-label  { font-size: 12.5px; font-weight: 700; color: var(--ink); }
#res-label   { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.ph-hint     { font-size: 11px; color: var(--muted); display: inline-flex; align-items: center; gap: 5px; }
.ph-hint .dot{ width: 8px; height: 8px; border-radius: 2px; background: #06b6d4; }
#zoom-level  { font-family: var(--mono); font-size: 10.5px; color: var(--muted); min-width: 36px; text-align: right; }
#preview-wrap { flex: 1; position: relative; background: var(--bg); overflow: hidden; min-height: 0; }
#preview-canvas { display: block; position: absolute; inset: 0;
  width: 100%; height: 100%; cursor: crosshair; }

/* Tools panel */
#tools-card { width: 410px; min-width: 320px; flex-shrink: 0;
  display: flex; flex-direction: column; background: var(--panel);
  border: 1px solid var(--border); border-radius: var(--r-md); overflow: hidden; }

/* Tabs */
#tabs-bar { display: flex; align-items: center; gap: 1px; padding: 0 2px;
  border-bottom: 1px solid var(--border); flex-shrink: 0; }
.tab-btn { position: relative; padding: 8px 12px 9px; font-size: 12px; font-weight: 600;
  color: var(--muted); transition: color .15s; }
.tab-btn::after { content:''; position: absolute; left:0; right:0; bottom:-1px;
  height: 2px; border-radius: 2px; background: transparent; transition: background .15s; }
.tab-btn.active { color: var(--accent); }
.tab-btn.active::after { background: var(--accent); }
.tab-btn:hover:not(.active) { color: var(--dim); }

.tab-pane { display: none; flex: 1; min-height: 0; overflow-y: auto; padding: 8px; }
.tab-pane.active { display: flex; flex-direction: column; gap: 6px; }

/* ── Collapsible groups ──────────────────────────────────────────────────── */
.group { border: 1px solid #e9ecf1; border-radius: var(--r-md); overflow: hidden; }

.grp-hdr { display: flex; align-items: center; gap: 7px; padding: 8px 11px;
  cursor: pointer; user-select: none; transition: background .1s; }
.grp-hdr:hover { background: var(--alt); }

.grp-title { font-size: 10.5px; font-weight: 700; letter-spacing: .05em;
  color: var(--muted); text-transform: uppercase; }

.grp-chevron { margin-left: auto; color: var(--muted); flex-shrink: 0;
  transition: transform .15s; }
.group.closed .grp-chevron { transform: rotate(-90deg); }

.grp-body { display: flex; flex-direction: column; gap: 7px;
  padding: 0 11px 10px; }
.group.closed .grp-body { display: none; }

/* Row inside group */
.row { display: flex; align-items: center; gap: 6px; }
.lbl { font-size: 11.5px; color: var(--dim); font-weight: 500; min-width: 52px; flex-shrink: 0; }
.lbl.n { min-width: 38px; }
.row > input { flex: 1; min-width: 0; }
.btns { display: flex; flex-wrap: wrap; gap: 5px; }
.btns .btn { flex: 1; min-width: 60px; }

/* Readout & swatch */
#color-swatch, #cc-swatch { width: 28px; height: 26px; border-radius: 6px;
  border: 1px solid var(--border); flex-shrink: 0; background: #eee; }

/* Badges */
.badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px;
  font-weight: 600; border-radius: 999px; padding: 2px 7px; }
.badge.cyan { color: #0e8aa3; background: #e3f7fb; border: 1px solid #c4ecf3; }
.badge.cyan .bd { width: 6px; height: 6px; border-radius: 2px; background: #06b6d4; }

#ocr-engine { font-size: 10px; font-weight: 600; color: #1c7a44;
  background: var(--ok-bg); border: 1px solid var(--ok-bd); border-radius: 999px; padding: 2px 7px; }
#ocr-engine.unavailable { color: var(--warn); background: var(--warn-bg); border-color: #e7d5a4; }

/* Checkboxes */
.cb-line { display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer; }
.cb { width: 17px; height: 17px; border-radius: 5px; border: 1.5px solid #cfd5dd;
  background: var(--panel); flex-shrink: 0; display: flex; align-items: center;
  justify-content: center; transition: background .12s, border-color .12s; }
.cb.checked { background: var(--accent); border-color: var(--accent); }
.cb svg { opacity: 0; transition: opacity .1s; }
.cb.checked svg { opacity: 1; }

/* Template result */
.tpl-result { font-family: var(--mono); font-size: 11.5px; color: #1c7a44;
  background: #f1faf4; border: 1px solid #d7eede; border-radius: var(--r-sm); padding: 8px 10px; }
.tpl-result.empty { font-family: var(--sans); color: var(--muted);
  background: var(--surface); border-color: var(--border); }

/* Color check */
.cc-result { padding: 7px 9px; border-radius: var(--r-sm); font-size: 11.5px; display: none; }
.cc-result.ok  { background: var(--ok-bg);  border: 1px solid var(--ok-bd);  color: #1c7a44; }
.cc-result.bad { background: var(--err-bg); border: 1px solid var(--err-bd); color: var(--err); }

/* Key strip */
.key-strip { display: flex; flex-wrap: wrap; gap: 5px; }
.key-strip .btn { flex: none; height: 26px; padding: 0 9px; font-size: 10.5px; font-weight: 600; }

/* Device info */
.info-grid { display: grid; grid-template-columns: auto 1fr; gap: 7px 14px; }
.info-grid .k { font-size: 11.5px; color: var(--muted); font-weight: 600; white-space: nowrap; }
.info-grid .v { font-size: 11.5px; color: var(--ink); word-break: break-word;
  user-select: text; font-family: var(--mono); }

/* Asset library */
.asset-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(88px,1fr)); gap: 7px; }
.asset-card { display: flex; flex-direction: column; cursor: pointer;
  border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
  transition: border-color .12s, box-shadow .12s; }
.asset-card:hover  { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(47,111,237,.12); }
.asset-card.active { border-color: var(--accent); }
.asset-thumb { width: 100%; height: 66px; object-fit: contain; background: #1a1d21; display: block; }
.asset-name  { font-size: 9.5px; color: var(--dim); padding: 3px 5px 4px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Log ─────────────────────────────────────────────────────────────────── */
#log-card { flex-shrink: 0; display: flex; flex-direction: column; min-height: 100px; max-height: 155px; }
#log-card.collapsed { min-height: 0; max-height: none; }
#log-card.collapsed .log-body { display: none; }
#log-card.collapsed .log-hdr { border-bottom: none; }
.log-hdr  { display: flex; align-items: center; gap: var(--s2); padding: var(--s2) var(--s4);
  border-bottom: 1px solid var(--border); flex-shrink: 0; cursor: pointer; user-select: none;
  transition: background .1s; border-radius: var(--r-md) var(--r-md) 0 0; }
.log-hdr:hover { background: var(--alt); }
.log-chevron { color: var(--muted); display: inline-flex; transition: transform .15s var(--ease); }
#log-card.collapsed .log-chevron { transform: rotate(-90deg); }
.log-label { font-size: 10.5px; font-weight: 700; letter-spacing: .05em;
  color: var(--muted); text-transform: uppercase; }
.log-count { font-family: var(--mono); font-size: 10px; color: var(--muted);
  background: var(--alt); border-radius: 999px; padding: 1px 7px; min-width: 18px; text-align: center; }
.log-count:empty { display: none; }
.btn-log-clear { font-size: 11px; font-weight: 600; color: var(--muted);
  padding: 3px 7px; border-radius: 5px; transition: color .1s, background .1s; }
.btn-log-clear:hover { color: var(--dim); background: var(--panel); }
.log-body { flex: 1; min-height: 0; overflow-y: auto; padding: 7px 10px;
  background: var(--log-bg); border-radius: 0 0 var(--r-md) var(--r-md);
  user-select: text; cursor: text; }
.log-line { display: flex; gap: 7px; font-family: var(--mono); font-size: 10.5px;
  line-height: 1.75; white-space: nowrap; }
.log-ts  { color: var(--log-muted); flex-shrink: 0; }
.log-tag { font-weight: 700; flex-shrink: 0; }
.log-msg { color: var(--log-ink); white-space: normal; }
.log-info    { color: #5b86c9; } .log-success { color: #2fa55a; }
.log-warning { color: #c08a1e; } .log-error   { color: #cf4b43; }

/* ── Footer ──────────────────────────────────────────────────────────────── */
#footer { display: flex; align-items: center; gap: 6px; padding: 2px 5px 3px; flex-shrink: 0; }
#footer-dot { width: 7px; height: 7px; border-radius: 50%; background: #d3d9e0;
  flex-shrink: 0; transition: background .2s; }
#footer-dot.connected { background: #2fa55a; }
#status-text { font-size: 11px; color: var(--dim); font-weight: 500;
  flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#hover-pos  { font-family: var(--mono); font-size: 10.5px; color: var(--muted); min-width: 88px; text-align: right; }
#footer-out { font-size: 11px; color: var(--log-muted); font-family: var(--mono); }

@keyframes fadeInUp { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation: fadeInUp .2s var(--ease) both; }

/* ── Workflow designer (node-graph view) ───────────────────────────────────── */
#mode-tabs { display:flex; gap:2px; background:var(--alt); border-radius:8px; padding:3px; }
.mode-btn { padding:5px 14px; border-radius:6px; font-size:12px; font-weight:700; color:var(--dim); transition:background .15s, color .15s; }
.mode-btn:hover:not(.active) { color:var(--ink); }
.mode-btn.active { background:var(--panel); color:var(--accent); box-shadow:0 1px 2px rgba(0,0,0,.06); }
.tb-divider { width:1px; height:20px; background:var(--border2); flex-shrink:0; }
/* Speed-hack control cluster: its own bordered box so it reads as a separate,
   manual tool — independent of "Chạy thử". Turns amber when enabled. */
.wf-speed-group { display:flex; align-items:center; gap:5px; padding:3px 7px;
  border:1px solid var(--border2); border-radius:8px; background:var(--surface); transition:background .15s, border-color .15s; }
.wf-speed-group.on { border-color:#f1c84b; background:#fdf6e9; }
.wf-speed-group .hz-unit { margin-left:-2px; }
.wf-speed-title { font-size:10px; font-weight:700; letter-spacing:.04em; text-transform:uppercase;
  color:var(--muted); white-space:nowrap; }
.wf-speed-group.on .wf-speed-title { color:#9c6c12; }
#wf-speed-run-btn.ok  { background:var(--ok);  color:#fff; border-color:var(--ok); }
#wf-speed-run-btn.err { background:var(--err); color:#fff; border-color:var(--err); }

#workflow-view { flex:1; display:flex; gap:7px; min-height:0; overflow:hidden; }

/* Left sidebar: activities + palette */
#wf-side { width:212px; flex-shrink:0; display:flex; flex-direction:column; overflow:hidden; }
/* Drag handle to resize the left sidebar. A wide hit-area with a thin visible spine. */
#wf-side-resizer { width:7px; flex-shrink:0; cursor:col-resize; position:relative; align-self:stretch; }
#wf-side-resizer::before { content:""; position:absolute; left:2px; top:0; bottom:0; width:3px; border-radius:3px;
  background:transparent; transition:background .12s; }
#wf-side-resizer:hover::before, #wf-side-resizer.drag::before { background:var(--accent); }
.wf-side-sec { display:flex; flex-direction:column; min-height:0; }
.wf-side-sec + .wf-side-sec { border-top:1px solid var(--line); }
.wf-side-hdr { display:flex; align-items:center; gap:var(--s2); font-size:10.5px; font-weight:700; letter-spacing:.05em;
  color:var(--dim); text-transform:uppercase; padding:var(--s4) var(--s4) var(--s2); }
.wf-side-hdr .btn { text-transform:none; letter-spacing:0; }
.side-count { font-family:var(--mono); font-size:9.5px; font-weight:600; color:var(--muted);
  background:var(--alt); border-radius:999px; padding:1px 6px; letter-spacing:0; }
.side-count:empty { display:none; }
#wf-activities { padding:0 9px 8px; display:flex; flex-direction:column; gap:4px; max-height:230px; overflow-y:auto; }
#wf-side .wf-palette { padding:0 9px 10px; overflow-y:auto; }

.wf-act { display:flex; align-items:center; gap:6px; padding:6px 8px; border:1px solid var(--border);
  border-radius:7px; cursor:pointer; transition:border-color .1s, background .1s; }
.wf-act:hover { background:var(--alt); }
.wf-act.sel { border-color:var(--accent); background:var(--accent-bg); }
.wf-badge { font-size:8.5px; font-weight:700; letter-spacing:.03em; border-radius:4px; padding:2px 4px; flex-shrink:0; }
.wf-badge.seq { color:#2559c7; background:#eef5ff; border:1px solid var(--accent-bd); }
.wf-badge.bg  { color:#9c6c12; background:var(--warn-bg); border:1px solid #e7d5a4; }
.wf-act-name { font-size:11.5px; font-weight:600; color:var(--ink); flex:1; min-width:0;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.wf-act-cb { width:15px; height:15px; border-radius:4px; border:1.5px solid #cfd5dd; background:var(--panel);
  flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.wf-act-cb.checked { background:var(--accent); border-color:var(--accent); }
.wf-act-cb svg { opacity:0; } .wf-act-cb.checked svg { opacity:1; }
.wf-act-del { color:var(--muted); font-size:14px; line-height:1; padding:0 3px; border-radius:4px; flex-shrink:0; }
.wf-act-del:hover { color:var(--err); background:var(--err-bg); }
.wf-act-grip { display:flex; align-items:center; justify-content:center; flex-shrink:0; width:11px;
  margin:-6px 0 -6px -4px; align-self:stretch; color:#c4cbd4; cursor:grab; }
.wf-act-grip:hover { color:var(--dim); }
.wf-act-grip:active { cursor:grabbing; }
.wf-act.wf-dragging { opacity:.55; border-color:var(--accent); background:var(--accent-bg); }

.wf-palette { display:flex; flex-direction:column; gap:3px; }
.wf-pal-cat { font-size:9px; font-weight:700; letter-spacing:.05em; color:var(--muted); text-transform:uppercase; margin:5px 0 1px; }
.wf-pal-grid { display:grid; grid-template-columns:1fr 1fr; gap:4px; }
.wf-fn { cursor:pointer; }
.wf-badge.fn { color:#7c3aed; background:#f3eefe; border:1px solid #e0d4fb; font-size:11px; padding:1px 6px; }
.wf-chip { display:flex; align-items:center; gap:5px; padding:6px 7px; border:1px solid var(--border2);
  border-radius:7px; background:var(--panel); cursor:grab; font-size:10.5px; font-weight:600; color:var(--ink2);
  transition:border-color .1s, background .1s; user-select:none; }
.wf-chip:hover { border-color:var(--accent); background:var(--accent-bg); }
.wf-chip:active { cursor:grabbing; }
.wf-chip .ico { font-size:12px; }

/* Center: canvas */
#wf-main { flex:1; min-width:0; display:flex; flex-direction:column; overflow:hidden; }
#wf-bar { display:flex; align-items:center; gap:var(--s3); padding:var(--s3) var(--s4); border-bottom:1px solid var(--line); flex-shrink:0; }
#wf-bar > input { font-family:var(--sans); font-size:13px; font-weight:700; width:188px; flex-shrink:0; }
.wf-cur-act { font-size:11px; font-weight:600; color:var(--accent); background:var(--accent-bg);
  border:1px solid var(--accent-bd); border-radius:999px; padding:3px 10px; max-width:170px;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex-shrink:0; }
.wf-hint { font-size:10px; color:var(--muted); white-space:nowrap; overflow:hidden;
  text-overflow:ellipsis; min-width:0; flex-shrink:1; text-align:right; }
.wf-zoom { display:inline-flex; align-items:center; gap:4px; }
.wf-zoom .btn { width:24px; padding:0; font-size:14px; }
#wf-zoom-lbl { font-size:11px; font-family:var(--mono); color:var(--dim); min-width:38px; text-align:center; cursor:pointer; }
#wf-zoom-lbl:hover { color:var(--accent); }
#wf-canvas { flex:1; min-height:0; position:relative; overflow:hidden;
  background:var(--bg) radial-gradient(circle, #d9dee6 1px, transparent 1px); background-size:20px 20px;
  cursor:grab; }
#wf-canvas.panning { cursor:grabbing; }
#wf-world { position:absolute; left:0; top:0; width:4000px; height:3000px; transform:translate(0px,0px); transform-origin:0 0; }
#wf-wires { position:absolute; left:0; top:0; width:100%; height:100%; overflow:visible; pointer-events:none; }
/* Wires carry a directional arrowhead (markers defined per-colour in <defs>, see
   WF_WIRE_DEFS) so the flow direction reads at a glance. Rounded caps/joins keep
   the curves smooth. A wider transparent stroke under each path widens the
   click/hover target without thickening the visible line. */
/* A fat invisible hit-path sits under each wire so it's easy to hover / right-
   click without thickening the visible line. The visible wire is click-through. */
#wf-wires .wire-hit { fill:none; stroke:transparent; stroke-width:18; pointer-events:stroke;
  cursor:pointer; stroke-linecap:round; }
#wf-wires path.wire { fill:none; stroke:#9aa9bd; stroke-width:2.4; pointer-events:none;
  stroke-linecap:round; stroke-linejoin:round; marker-end:url(#wf-ah); transition:stroke .1s, stroke-width .1s; }
#wf-wires path.wire.t { stroke:#2fa55a; marker-end:url(#wf-ah-t); }
#wf-wires path.wire.f { stroke:#cf6b43; marker-end:url(#wf-ah-f); }
#wf-wires path.wire.stack { stroke:#b6c0cc; stroke-width:3; marker-end:none; }
/* Loop-back wire (target = a loop's 'lặp' input) — dashed amber so the wire that
   closes the loop reads differently from the forward flow. */
#wf-wires path.wire.loopback { stroke:#e0a64b; stroke-dasharray:6 4; marker-end:url(#wf-ah-loop); }
/* Hovering the hit-path tints the wire blue so you can tell which one you're on. */
#wf-wires .wire-grp:hover path.wire { stroke:var(--accent); stroke-width:3.4; marker-end:url(#wf-ah-temp); }
/* While wiring up a connection, wires ignore the pointer so the drop lands on the
   node underneath rather than being swallowed by a wire's hit-path. */
#wf-canvas.wf-connecting .wire-hit { pointer-events:none; }
/* Run trail on wires: the branch the engine took this run (green) vs the
   true/false branch it skipped (red, dimmed). Override the static t/f colours. */
#wf-wires path.wire.took-wire   { stroke:#2fa55a !important; stroke-width:3.4; marker-end:url(#wf-ah-t) !important; }
#wf-wires path.wire.nottook-wire{ stroke:#cf4b43 !important; opacity:.55; marker-end:url(#wf-ah-f) !important; }
#wf-wires path.temp { fill:none; stroke:var(--accent); stroke-width:2.4; stroke-dasharray:5 4;
  stroke-linecap:round; pointer-events:none; marker-end:url(#wf-ah-temp); }
#wf-canvas-empty { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  color:var(--muted); font-size:12px; pointer-events:none; }

/* Live variables panel — pinned bottom-right of the canvas. Shows the vars
   declared on the current activity (declared value) overlaid with live runtime
   values pushed from the engine during a test run. Collapsible. */
.wf-vars-panel { position:absolute; right:10px; bottom:10px; width:200px; max-height:46%;
  background:var(--panel); border:1px solid var(--border2); border-radius:9px;
  box-shadow:var(--sh-md); display:flex; flex-direction:column; z-index:5;
  font-size:11px; overflow:hidden; }
.wf-vars-panel.collapsed { max-height:26px; }
.wf-vars-hdr { display:flex; align-items:center; justify-content:space-between; gap:6px;
  padding:5px 9px; cursor:pointer; background:var(--bar); border-bottom:1px solid var(--border2);
  font-weight:700; letter-spacing:.04em; text-transform:uppercase; font-size:10px; color:var(--dim);
  user-select:none; }
.wf-vars-actions { display:flex; align-items:center; gap:5px; }
.wf-vars-live { color:var(--muted); font-size:9px; }
.wf-vars-add { width:16px; height:16px; line-height:13px; padding:0; border:1px solid var(--border2);
  border-radius:4px; background:var(--panel); color:var(--dim); cursor:pointer; font-size:13px;
  display:flex; align-items:center; justify-content:center; }
.wf-vars-add:hover { color:var(--accent); border-color:var(--accent); }
/* Global vars editor popover. */
.wf-globs-pop { position:fixed; z-index:50; width:250px; max-height:70vh;
  background:var(--panel); border:1px solid var(--border2); border-radius:9px; box-shadow:var(--sh-md);
  display:flex; flex-direction:column; overflow:hidden; }
.wf-globs-pop .wf-vars-hdr { cursor:default; }
.wf-globs-pop-body { overflow-y:auto; padding:6px; display:flex; flex-direction:column; gap:6px; }
.wf-glob-card { border:1px solid var(--border2); border-radius:7px; padding:5px; display:flex; flex-direction:column; gap:4px; }
.wf-glob-tag { font-size:9px; color:var(--accent); font-weight:700; letter-spacing:.04em; }
.wf-glob-del { width:20px; height:20px; line-height:1; padding:0; border:1px solid var(--border2);
  border-radius:5px; background:var(--panel); color:var(--err); cursor:pointer; font-size:15px;
  font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.wf-glob-del:hover { background:var(--err-bg); border-color:var(--err); }
.wf-vars-panel.live .wf-vars-live { color:#2fa55a; animation:wfPulse 1.4s ease-in-out infinite; }
@keyframes wfPulse { 0%,100%{opacity:1} 50%{opacity:.35} }
.wf-vars-body { overflow-y:auto; padding:4px 6px 6px; }
.wf-vars-empty { color:var(--muted); padding:6px 4px; font-size:10.5px; }
.wf-var-row-live { display:flex; align-items:baseline; gap:6px; padding:3px 4px; border-radius:5px; }
.wf-var-row-live:hover { background:var(--bg); }
.wf-var-row-live .vn { font-family:var(--mono); color:var(--ink); flex:1; min-width:0;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.wf-var-row-live .vv { font-family:var(--mono); color:var(--accent); max-width:96px;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; text-align:right; }
.wf-var-row-live .vv.fresh { color:#2fa55a; font-weight:600; }

/* Node — a clean rectangular card with one uniform neutral border. Category is
   hinted only by the icon colour (--node-accent); the run colours (green/red/
   amber) recolour the whole border so a run still reads at a glance. */
.wf-node { position:absolute; width:158px; background:var(--panel);
  border:1px solid var(--border2);
  border-radius:var(--node-r); box-shadow:var(--sh-md); user-select:none; }
.wf-node.sel { border-color:var(--accent); border-top-color:var(--accent);
  box-shadow:0 0 0 2px var(--accent-bd), var(--sh-md); }
/* Run trail: a node that finished this run (green = ran ok, red = action failed).
   Defined before .running so the live amber glow still wins on the active node. */
.wf-node.ran-ok   { border-color:#2fa55a; box-shadow:0 0 0 1px #2fa55a, 0 2px 6px rgba(31,146,84,.18); }
.wf-node.ran-fail { border-color:#cf4b43; box-shadow:0 0 0 1px #cf4b43, 0 2px 6px rgba(207,75,67,.20); }
/* Reached-but-not blocks: a finished run never entered these (a branch not
   taken). Their top accent bar reds out and the whole block dims, so the path
   that DID run stays the bright green trail and the skipped paths recede. */
.wf-node.ran-skip { border-top-color:#cf4b43 !important; opacity:.5; }
/* Structural kinds set their own accent colour. Terminals (start/end/stop) also
   keep a faint header tint so the flow's entry/exit points stand out. */
.wf-node.start { --node-accent:var(--ok); }
.wf-node.start .wf-node-hd { background:var(--ok-bg); }
.wf-node.end, .wf-node.stop { --node-accent:var(--err); }
.wf-node.end .wf-node-hd, .wf-node.stop .wf-node-hd { background:var(--err-bg); }
.wf-node.condition { --node-accent:#9a78e6; }
.wf-node.loop { --node-accent:#e0a64b; }
.wf-node.call { --node-accent:#7c3aed; }
.wf-node.call .ico { font-style:italic; font-weight:700; }
/* Per-category accent colour, placed AFTER the kind rules so it also colours the
   image/ocr/logic condition blocks (action + condition nodes carry a cat class). */
.wf-node.cat-basic { --node-accent:#6f9be8; }
.wf-node.cat-image { --node-accent:#2fb0a3; }
.wf-node.cat-ocr   { --node-accent:#e0954b; }
.wf-node.cat-logic { --node-accent:#9a78e6; }
.wf-node.cat-flow  { --node-accent:#e0a64b; }
.wf-node.cat-misc  { --node-accent:#9aa6b4; }
.wf-node.conn-target { box-shadow:0 0 0 2px var(--ok); }
/* ── Merged blocks (vertical stack) ───────────────────────────────────────────
   Members of a merge share a `node.stack` id and sit flush; the join edges and
   the ports between them are hidden so the stack reads as one block. A node
   joined at its top/bottom loses that corner's radius and top accent bar. */
.wf-node.wf-stacked { box-shadow:0 0 0 1px var(--accent-bd), var(--sh-md); }
.wf-node.wf-stacked.sel { box-shadow:0 0 0 2px var(--accent-bd), var(--sh-md); }
.wf-node.wf-stk-jtop { border-top-width:1px; border-top-color:var(--border2);
  border-top-left-radius:0; border-top-right-radius:0; }
.wf-node.wf-stk-jbot { border-bottom-left-radius:0; border-bottom-right-radius:0; }
/* Drag preview: a bold accent bar on the edge the dragged block will snap onto. */
.wf-node.wf-merge-bot { box-shadow:0 4px 0 -1px var(--accent), var(--sh-md); }
.wf-node.wf-merge-top { box-shadow:0 -4px 0 -1px var(--accent), var(--sh-md); }
/* ── Groups (frames) ──────────────────────────────────────────────────────────
   A named rectangle drawn behind the nodes. Moving its header moves every node
   inside it. The body is click-through (pointer-events:none) so nodes stay usable;
   only the header tab + resize handle are interactive. */
.wf-group { position:absolute; z-index:0; border:1.5px dashed; border-radius:10px; pointer-events:none; }
.wf-group.sel { border-style:solid; box-shadow:0 0 0 1px currentColor; }
.wf-group-hd { position:absolute; left:-1.5px; top:-23px; max-width:280px; height:22px; display:flex; align-items:center; gap:6px;
  padding:0 4px 0 9px; border-radius:8px 8px 0 0; font-size:11px; font-weight:700; color:#fff;
  pointer-events:auto; cursor:move; white-space:nowrap; }
.wf-group-name { overflow:hidden; text-overflow:ellipsis; }
.wf-group-del { color:#fff; opacity:.8; font-size:14px; line-height:1; padding:0 2px; border-radius:4px; flex-shrink:0; cursor:pointer; }
.wf-group-del:hover { opacity:1; background:rgba(255,255,255,.25); }
.wf-group-resize { position:absolute; right:-5px; bottom:-5px; width:14px; height:14px; cursor:nwse-resize; pointer-events:auto;
  border-right:2.5px solid currentColor; border-bottom:2.5px solid currentColor; border-bottom-right-radius:9px; opacity:.6; }
.wf-group-resize:hover { opacity:1; }
/* Context menu */
#wf-ctxmenu { position:fixed; z-index:50; display:none; min-width:140px; background:var(--panel);
  border:1px solid var(--border2); border-radius:8px; box-shadow:0 6px 22px rgba(20,30,45,.18); padding:4px; }
.wf-ctx-item { padding:7px 10px; font-size:12px; color:var(--ink); border-radius:5px; cursor:pointer; white-space:nowrap; }
.wf-ctx-item:hover { background:var(--accent-bg); color:var(--accent); }
/* The block the engine is on right now: a solid yellow "đang đợi / đang chạy"
   fill (not just a glow) so it's unmistakable even when other blocks already
   carry the green/red trail. Overrides ran-ok/ran-fail (defined earlier). */
.wf-node.running { border-color:#f59e0b !important; background:#fff4d6;
  box-shadow:0 0 0 3px rgba(245,158,11,.40), 0 0 16px rgba(245,158,11,.6) !important; animation:wfRun 1s ease-in-out infinite; }
.wf-node.running .wf-node-hd { background:#fde68a; border-bottom-color:#f1c84b; }
.wf-node.running .wf-node-title { color:#7a4f0a; }
.wf-node-eye { color:var(--muted); font-size:12px; line-height:1; padding:0 2px; border-radius:4px; flex-shrink:0; cursor:pointer; }
.wf-node-eye:hover { color:var(--accent); background:var(--accent-bg); }
.wf-node-eye.on { color:var(--accent); }
/* Uniform preview band: a fixed-height frame, image centred and NEVER upscaled
   (scale-down keeps small crops crisp instead of stretching them blurry). */
.wf-node-thumb { display:block; width:100%; height:68px; object-fit:scale-down;
  background:#eef1f5 repeating-conic-gradient(#e6e9ef 0% 25%, transparent 0% 50%) 50%/14px 14px;
  border-top:1px solid var(--line); border-radius:0 0 var(--node-r) var(--node-r); padding:3px; }
/* Multi-template strip (tap_image_any / wait_image_any / if_image_any): a row of
   small thumbnails so every OR-image is visible at a glance, not just the first. */
.wf-node-thumbs { display:flex; flex-wrap:wrap; gap:3px; padding:4px; min-height:30px;
  background:#eef1f5 repeating-conic-gradient(#e6e9ef 0% 25%, transparent 0% 50%) 50%/14px 14px;
  border-top:1px solid var(--line); border-radius:0 0 var(--node-r) var(--node-r); }
.wf-node-thumb-sm { width:38px; height:30px; object-fit:scale-down; border:1px solid var(--line);
  border-radius:4px; background:var(--panel); }
/* Hovering a block that's showing a preview image lifts it above neighbours so
   the thumbnail isn't hidden behind other blocks. */
.wf-node.has-thumb:hover { z-index:var(--z-node-hover); }
.wf-tpl-preview { display:block; max-width:100%; max-height:150px; object-fit:contain; margin-top:6px;
  border:1px solid var(--border2); border-radius:6px; background:#1a1d21; }
.wf-tpl-empty { font-size:10px; color:var(--muted); margin-top:5px; font-style:italic; }
.wf-var-card { border:1px solid var(--border2); border-radius:7px; padding:6px; margin-top:6px; background:var(--panel); display:flex; flex-direction:column; gap:5px; }
.wf-var-row { display:flex; align-items:center; gap:5px; }
.wf-var-chip { cursor:grab; font-size:13px; flex-shrink:0; padding:2px; border:1px solid var(--border2); border-radius:5px; background:var(--panel); }
.wf-var-chip:hover { border-color:var(--accent); background:var(--accent-bg); }
.wf-var-chip:active { cursor:grabbing; }
.wf-var-row select { font-size:11px; padding:3px 4px; }
.wf-var-row .cb { width:17px; height:17px; border-radius:5px; border:1.5px solid #cfd5dd; background:var(--panel); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
.wf-var-row .cb.checked { background:var(--accent); border-color:var(--accent); }
.wf-var-row .cb svg { opacity:0; } .wf-var-row .cb.checked svg { opacity:1; }
@keyframes wfRun { 0%,100%{ box-shadow:0 0 0 3px rgba(245,158,11,.30), 0 0 10px rgba(245,158,11,.45);} 50%{ box-shadow:0 0 0 3px rgba(245,158,11,.55), 0 0 20px rgba(245,158,11,.8);} }
.wf-node.note { width:170px; border:1px solid #e7d5a4; background:#fdf6e9; }
.wf-node.note .wf-node-hd { background:transparent; border-bottom:1px dashed #e7d5a4; }
.wf-node.note .wf-node-sum { white-space:normal; color:#7a5b12; font-family:var(--sans); font-size:11px; }
.wf-node.note .wf-node-title { color:#7a5b12; }   /* keep sticky-note blocks cohesive */
.wf-selbox { position:absolute; border:1px solid var(--accent); background:rgba(47,111,237,.10); z-index:1; pointer-events:none; border-radius:2px; }
.wf-node { cursor:grab; }
.wf-node:active { cursor:grabbing; }
/* Light-purple header band so the title row is clearly distinct from the white body. */
.wf-node-hd { display:flex; align-items:center; gap:6px; padding:7px 9px; border-bottom:1px solid #ece3fb;
  background:#f4eefe; border-radius:var(--node-r) var(--node-r) 0 0; }
.wf-node.collapsed .wf-node-hd { border-bottom:none; border-radius:var(--node-r); }
.wf-node .ico { font-size:13px; flex-shrink:0; color:var(--node-accent,var(--ink2)); }
/* Purple title on the light-purple header band — clearly set apart from the body. */
.wf-node-title { font-size:11.5px; font-weight:700; color:#7c3aed; flex:1; min-width:0;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
/* Keep the title clear of the top-right "T"/"F" port labels on branch nodes. */
.wf-node.has-tf .wf-node-title { padding-right:14px; }
/* Validation badge: a node missing a template / not wired in shows an amber "!" so
   broken flows are obvious before you even run them. Hover for the reason(s). */
.wf-node-warn { position:absolute; top:-8px; right:-8px; width:16px; height:16px; border-radius:50%;
  background:#f3b51a; color:#3a2c05; font-size:10px; font-weight:800; line-height:16px; text-align:center;
  box-shadow:0 1px 3px rgba(20,30,45,.3); z-index:3; cursor:help; }
.wf-node.has-warn { border-color:#e6a417; }
.wf-node-sum { font-family:var(--mono); font-size:9.5px; color:var(--muted); padding:5px 9px;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.wf-node-note { font-size:9.5px; font-style:italic; color:#7c6f55; background:#fdf9ee;
  border-top:1px dashed var(--line); border-radius:0 0 var(--node-r) var(--node-r); padding:4px 9px; white-space:normal; word-break:break-word; }
.wf-node-note::before { content:"📝 "; font-style:normal; }
/* Runtime log line: text auto-emitted to the log panel each time this block runs. */
.wf-node-log { font-size:9.5px; color:#2f6b8f; background:#eef6fb;
  border-top:1px dashed var(--line); border-radius:0 0 var(--node-r) var(--node-r); padding:4px 9px; white-space:normal; word-break:break-word; }
.wf-node-log::before { content:"📋 "; }

/* Ports */
.wf-port { position:absolute; width:13px; height:13px; border-radius:50%; background:var(--panel);
  border:2px solid var(--muted); cursor:crosshair; z-index:2; }
.wf-port:hover { border-color:var(--accent); background:var(--accent-bg); }
.wf-port.in  { left:-7px; top:9px; }
.wf-port.out { right:-7px; }
/* A loop's second input — the 'lặp' (loop-back) port — is amber-ringed so it
   reads as the place a block wires back to, distinct from the plain 'vào' entry. */
.wf-port.in.loop { border-color:#e0a64b; background:#fff7ea; }
.wf-port.in.loop:hover { border-color:var(--accent); background:var(--accent-bg); }
.wf-port-row { position:absolute; right:-7px; display:flex; align-items:center; }
.wf-port-lbl { position:absolute; right:14px; font-size:8.5px; font-weight:700; color:var(--muted); white-space:nowrap; }
/* Input-side labels sit in the gutter to the LEFT of the node (mirroring the
   right-side output labels), so 'vào' / 'lặp' don't collide with node content. */
.wf-port-lbl.in { right:auto; left:-34px; width:28px; text-align:right; }
.wf-port-lbl.in.loop { color:#c2841f; }
.wf-port.out.t { border-color:#2fa55a; } .wf-port.out.f { border-color:#cf6b43; }
/* Run trail on ports: the output taken this run (filled green) vs the skipped
   true/false sibling (filled red). */
.wf-port.out.took    { border-color:#2fa55a; background:#2fa55a; }
.wf-port.out.nottook { border-color:#cf4b43; background:#cf4b43; }

/* Right inspector */
#wf-inspector { width:236px; flex-shrink:0; display:flex; flex-direction:column; overflow:hidden; }
#wf-insp-body { flex:1; min-height:0; overflow-y:auto; padding:4px 12px 12px; display:flex; flex-direction:column; gap:8px; }
.wf-insp-empty { font-size:11.5px; color:var(--muted); line-height:1.6; padding-top:6px; }
.wf-field { display:flex; align-items:center; gap:6px; }
.wf-field > label { font-size:10.5px; color:var(--dim); font-weight:600; min-width:58px; flex-shrink:0; }
.wf-field > input[type=text], .wf-field > input[type=number] { flex:1; min-width:0; }
.wf-field .cb { width:17px; height:17px; border-radius:5px; border:1.5px solid #cfd5dd; background:var(--panel);
  display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
.wf-field .cb.checked { background:var(--accent); border-color:var(--accent); }
.wf-field .cb svg { opacity:0; } .wf-field .cb.checked svg { opacity:1; }
.wf-insp-sec { font-size:10px; font-weight:700; letter-spacing:.05em; color:var(--muted); text-transform:uppercase; margin-top:4px; }
.wf-empty-note { font-size:11.5px; color:var(--muted); padding:6px 2px; text-align:center; }
</style>

<!-- ── Footer ────────────────────────────────────────────────────────────── -->

<div id="footer">
  <span id="footer-dot"></span>
  <span id="status-text">Sẵn sàng</span>
  <span class="spacer"></span>

<script>
// ── Base helpers ────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const api = () => window.pywebview.api;
const LOG_TAG = {info:"INF",success:"OK ",warning:"WRN",error:"ERR"};
const S = { devices:[], connectedSerial:null };
function setStatus(msg){ const e=$("status-text"); if(e) e.textContent=msg; }
function escHtml(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function setConnected(on){ const a=$("device-dot"),b=$("footer-dot"); if(a)a.className=on?"connected":""; if(b)b.className=on?"connected":""; }

// Load a template thumbnail (data-URL from Python) into an <img>, hide if none.
async function wfLoadThumb(img, path){
  if(!img) return;
  img.style.display="none"; img.removeAttribute("src");
  if(!path){ return; }
  try{ const d=await api().image_thumbnail(path); if(d){ img.src=d; img.style.display="block"; } }catch{}
}

// Run visualisation. The engine reports (a) the node about to run — painted amber
// while live — and (b) each node's result once it finishes. Results accumulate
// into a persistent "trail" for the whole run: a node that ran turns its border
// green (red if an action failed), and a branch node greens the port/wire it took
// and reds the one it didn't. This is why fast blocks now stay visible — they keep
// the trail colour after the amber moves on.
let wfRunNode=null;
let wfRunStopped=false; // true once a finished run's trail is on display (greys-out skipped blocks)
let wfSkipIds=null;     // ids greyed out as "not reached", captured once when the run stops
const wfRan={};       // nodeId -> "ok" | "fail"
const wfRanPort={};   // nodeId -> output port actually taken
function wfNodeElById(id){ return id ? document.querySelector(`.wf-node[data-node="${id}"]`) : null; }
let wfRunLitAt=0;            // when the current amber node lit up (ms)
const WF_RUN_MIN_MS=220;    // floor on amber dwell, so instant blocks (nếu ảnh…) still flash yellow
function wfSetRunningNode(id){
  // Move the amber glow to the new node, leaving the green/red trail untouched.
  // Conditions like "nếu ảnh" finish in a few ms — without a dwell floor their
  // amber is added and removed within one frame and never paints. So keep the
  // previous node amber for at least WF_RUN_MIN_MS before clearing it.
  const now=Date.now();
  const prevId=wfRunNode, prevEl=wfNodeElById(prevId);
  if(prevEl && prevId!==id){
    const remain=WF_RUN_MIN_MS-(now-wfRunLitAt);
    if(remain>0) setTimeout(()=>{ if(wfRunNode!==prevId) prevEl.classList.remove("running"); }, remain);
    else prevEl.classList.remove("running");
  }
  wfRunNode=id||null;
  wfRunLitAt=now;
  const el=wfNodeElById(wfRunNode); if(el) el.classList.add("running");
}
function wfColorBranch(id, takenPort){
  document.querySelectorAll("#wf-wires path.wire").forEach(p=>{
    if(p.dataset.from!==id) return;
    p.classList.remove("took-wire","nottook-wire");
    if(p.dataset.fromport===takenPort) p.classList.add("took-wire");
    else if(wfIsBranchPort(p.dataset.fromport)) p.classList.add("nottook-wire");
  });
}
// Ports that are mutually-exclusive branches (so the not-taken ones dim on a run):
// condition true/false, and a switch node's c0.. / default ports.
function wfIsBranchPort(port){ return port==="true"||port==="false"||port==="default"||/^c\d+$/.test(port); }
function wfMarkNodeResult(id, status, port){
  if(!id) return;
  wfRan[id] = status==="fail" ? "fail" : "ok";
  if(port!==undefined && port!==null) wfRanPort[id]=port; else delete wfRanPort[id];
  const el=wfNodeElById(id); if(!el) return;
  // A condition that took its 'false' branch (e.g. "chạm ảnh" didn't find the
  // image) didn't really succeed — paint the node red to match its red false-wire,
  // instead of a misleading green. Only 'true'/'out'/'body'/'done' stay green.
  const failish = wfRan[id]==="fail" || wfRanPort[id]==="false";
  el.classList.toggle("ran-ok",   !failish);
  el.classList.toggle("ran-fail", failish);
  // Output ports: the one taken goes green, the other true/false sibling red.
  const taken = wfRanPort[id];
  el.querySelectorAll(".wf-port.out").forEach(p=>{
    p.classList.remove("took","nottook");
    if(taken==null) return;
    if(p.dataset.port===String(taken)) p.classList.add("took");
    else if(wfIsBranchPort(p.dataset.port)) p.classList.add("nottook");
  });
  if(taken!=null) wfColorBranch(id, String(taken));
}
// Once a run has stopped, red-bar every executable block it never entered, so the
// taken path (green) stands out against the skipped branches (dim red top). 'start'
// has no result event (the walk begins after it) and 'note' isn't executable, so
// both are left alone. The skip set is captured ONCE at stop time from the graph
// that ran — so blocks dragged in afterwards (which aren't in it) never get dimmed.
function wfMarkUnreached(){
  if(!Object.keys(wfRan).length) return;        // no run happened — nothing to grey out
  if(wfSkipIds===null){
    const g=wfGraph();
    wfSkipIds = g ? (g.nodes||[]).filter(n=>n.type!=="note"&&n.type!=="start"&&!wfRan[n.id]).map(n=>n.id) : [];
  }
  wfSkipIds.forEach(id=>{ const el=wfNodeElById(id); if(el) el.classList.add("ran-skip"); });
}
// Re-paint the whole trail after a canvas redraw (nodes/wires are rebuilt fresh).
function wfReapplyRunViz(){
  Object.keys(wfRan).forEach(id=>wfMarkNodeResult(id, wfRan[id], wfRanPort[id]));
  const el=wfNodeElById(wfRunNode); if(el) el.classList.add("running");
  if(wfRunStopped) wfMarkUnreached();
}
function wfResetRunViz(){
  wfRunNode=null; wfRunStopped=false; wfSkipIds=null;
  for(const k in wfRan) delete wfRan[k];
  for(const k in wfRanPort) delete wfRanPort[k];
  document.querySelectorAll(".wf-node.running,.wf-node.ran-ok,.wf-node.ran-fail,.wf-node.ran-skip")
    .forEach(el=>el.classList.remove("running","ran-ok","ran-fail","ran-skip"));
  document.querySelectorAll("#wf-wires path.took-wire,#wf-wires path.nottook-wire")
    .forEach(p=>p.classList.remove("took-wire","nottook-wire"));
  document.querySelectorAll(".wf-port.out.took,.wf-port.out.nottook")
    .forEach(p=>p.classList.remove("took","nottook"));
}

function appendLog(entry){
  const body=$("log-body"); if(!body) return;
  const line=document.createElement("div"); line.className="log-line fade-in";
  line.innerHTML=`<span class="log-ts">${entry.ts}</span>`+
    `<span class="log-tag log-${entry.level}">${LOG_TAG[entry.level]||"INF"}</span>`+
    `<span class="log-msg">${escHtml(entry.msg)}</span>`;
  body.appendChild(line);
  while(body.children.length>500) body.removeChild(body.firstChild);
  body.scrollTop=body.scrollHeight;
  updateLogCount();
}
function rebuildDeviceSelect(devices, connected){
  const sel=$("device-select"), prev=sel.value; sel.innerHTML="";
  if(!devices||!devices.length){ const o=document.createElement("option"); o.value=""; o.textContent="Không có thiết bị"; sel.appendChild(o); sel.disabled=true; return; }
  sel.disabled=false;
  devices.forEach(d=>{ const o=document.createElement("option"); o.value=d.serial||""; o.textContent=(d.name||d.serial)+(d.serial?` (${d.serial})`:""); sel.appendChild(o); });
  sel.value=connected||S.connectedSerial||prev||(devices[0]&&devices[0].serial)||"";
}

// ── Python events ───────────────────────────────────────────────────────────
window.__recv = function(raw){
  let ev; try{ev=JSON.parse(raw);}catch{return;}
  const {type,data}=ev;
  if(type==="log"){ appendLog(data); return; }
  if(type==="log_cleared"){ const b=$("log-body"); if(b)b.innerHTML=""; updateLogCount(); return; }
  if(type==="devices_update"){ S.devices=data.devices||[]; rebuildDeviceSelect(S.devices,S.connectedSerial); return; }
  if(type==="device_status"){ S.connectedSerial=data.serial||null; setConnected(!!data.connected); rebuildDeviceSelect(S.devices,data.serial); return; }
  if(type==="workflow_state"){ wfSetRunning(!!data.running); return; }
  // Ignore node events for a graph we're not viewing (e.g. a function's internal
  // nodes while a call node runs) so the call block stays lit instead of the
  // highlight vanishing into the off-screen function graph. Also drop late events
  // that land after the run already stopped.
  if(type==="node_active"){ if(!wfRunning) return; if(data.id && !wfNode(data.id)) return; wfSetRunningNode(data.id); return; }
  if(type==="node_result"){ if(!wfRunning) return; if(data.id && !wfNode(data.id)) return; wfMarkNodeResult(data.id, data.status, data.port); return; }
  if(type==="speedhack_state"){
    wfSpeedRunning=!!data.running; wfSyncSpeedUI();
    if(data.running && data.active) setStatus("Speed hack đang chạy");
    else if(!data.running) setStatus("Speed hack đã tắt");
    return;
  }
  if(type==="var_update"){ wfLiveVars[data.name]=data.value; wfRenderVarsPanel(); return; }
  if(type==="vars_snapshot"){ wfLiveVars=data.vars||{}; wfRenderVarsPanel(); return; }
};

// ── Log drawer ────────────────────────────────────────────────────────────────
function updateLogCount(){ const c=$("log-count"), b=$("log-body"); if(c&&b) c.textContent = b.children.length? String(b.children.length):""; }
function wfToggleLog(ev){
  if(ev && ev.target.closest(".btn-log-clear")) return;   // let "Xoá" act without toggling
  const c=$("log-card"); if(!c) return;
  c.classList.toggle("collapsed");
  wfSaveSettings();
}

// ── Device handlers ─────────────────────────────────────────────────────────
function onClearLog(ev){ if(ev) ev.stopPropagation(); api().clear_log(); }
async function onRefreshDevices(){ await api().refresh_devices(); }
async function onScanPorts(){ await api().scan_ports(); }
async function onRestartAdb(){ await api().restart_adb(); }
async function onDeviceChange(serial){ if(serial){ S.connectedSerial=serial; await api().select_device(serial); } }
async function openDevHelper(){ try{ await api().open_dev_helper(JSON.stringify(wfSerialize())); setStatus("Đang mở DevScope…"); }catch{} }

// New blank workflow.
async function wfNew(){
  if((WF.activities.length || WF.functions.length) &&
     !confirm("Tạo workflow mới? Các thay đổi chưa lưu sẽ mất.")) return;
  WF.name="My Workflow"; WF.version=2; WF.templatesDir="templates";
  WF.speedhack={enabled:false, speed:2.0, package:""};
  WF.activities=[]; WF.functions=[]; WF.edit={kind:"activity",id:null};
  WF.sel=[]; WF.selectedNode=null; wfPan={x:0,y:0}; wfZoom=1; wfRunNode=null;
  const nm=$("wf-name"); if(nm) nm.value=WF.name;
  wfSyncSpeedUI();
  try{ await api().workflow_new(); }catch{}
  wfAddActivity("sequence");   // seed one activity so the canvas isn't empty
  setStatus("Workflow mới");
}

// ── Keyboard (workflow shortcuts) ─────────────────────────────────────────────
window.addEventListener("keydown", e => {
  const typing = e.target && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName);
  if((e.key==="s"||e.key==="S") && (e.ctrlKey||e.metaKey)){ e.preventDefault(); wfSave(); return; }
  if(typing) return;   // below here: canvas shortcuts only (let inputs keep native Ctrl+C/V)
  if((e.key==="c"||e.key==="C") && (e.ctrlKey||e.metaKey)){ if(WF.sel.length){ e.preventDefault(); wfCopy(); } return; }
  if((e.key==="x"||e.key==="X") && (e.ctrlKey||e.metaKey)){ if(WF.sel.length){ e.preventDefault(); wfCut(); } return; }
  if((e.key==="v"||e.key==="V") && (e.ctrlKey||e.metaKey)){ e.preventDefault(); wfPaste(wfPointer.inside?{clientX:wfPointer.x,clientY:wfPointer.y}:null); return; }
  if((e.key==="d"||e.key==="D") && (e.ctrlKey||e.metaKey)){ if(WF.sel.length){ e.preventDefault(); wfDuplicate(); } return; }
  if(e.key===" "){ wfSpace=true; }
  if(e.key==="Delete"||e.key==="Backspace"){ if(WF.sel.length){ e.preventDefault(); wfDeleteSelected(); return; } }
  if((e.key==="a"||e.key==="A") && (e.ctrlKey||e.metaKey)){ const g=wfGraph(); if(g){ e.preventDefault(); WF.sel=g.nodes.map(n=>n.id); WF.selectedNode=null; wfMarkSel(); wfRenderInspector(); return; } }
  if((e.key==="f"||e.key==="F") && !e.ctrlKey && !e.metaKey){ e.preventDefault(); wfFit(); return; }
  if(e.key==="Escape"){ if(wfGroupMode) wfSetGroupMode(false); wfClearSel(); wfMarkSel(); wfRenderInspector(); }
});

let wfZoom=1;           // canvas zoom factor
function wfApplyTransform(){ const w=$("wf-world"); if(w) w.style.transform=`translate(${wfPan.x}px,${wfPan.y}px) scale(${wfZoom})`;
  const lbl=$("wf-zoom-lbl"); if(lbl) lbl.textContent=Math.round(wfZoom*100)+"%"; }
function wfSetZoom(z, cx, cy){
  z=Math.max(0.3, Math.min(2.5, z));
  const canvas=$("wf-canvas"); if(!canvas) { wfZoom=z; wfApplyTransform(); return; }
  // Keep the point (cx,cy) — relative to the canvas — fixed while zooming.
  if(cx===undefined){ const r=canvas.getBoundingClientRect(); cx=r.width/2; cy=r.height/2; }
  const wx=(cx-wfPan.x)/wfZoom, wy=(cy-wfPan.y)/wfZoom;
  wfZoom=z;
  wfPan.x=cx-wx*wfZoom; wfPan.y=cy-wy*wfZoom;
  wfApplyTransform();
  const lbl=$("wf-zoom-lbl"); if(lbl) lbl.textContent=Math.round(wfZoom*100)+"%";
}
function wfZoomBy(f){ wfSetZoom(wfZoom*f); }
function wfZoomReset(){ wfSetZoom(1); }
// Drag-to-resize the left sidebar; width persists in settings.
function wfInitSideResizer(){
  const side=$("wf-side"), rez=$("wf-side-resizer"); if(!side||!rez||rez.__wired) return;
  rez.__wired=true; let drag=null;
  rez.addEventListener("mousedown",e=>{ e.preventDefault(); drag={x:e.clientX, w:side.offsetWidth}; rez.classList.add("drag"); document.body.style.cursor="col-resize"; });
  window.addEventListener("mousemove",e=>{ if(!drag) return; side.style.width=Math.max(150, Math.min(480, drag.w+(e.clientX-drag.x)))+"px"; });
  window.addEventListener("mouseup",()=>{ if(!drag) return; drag=null; rez.classList.remove("drag"); document.body.style.cursor=""; wfSaveSettings(); });
}
// Fit & center all blocks of the current graph into the canvas. Uses the live DOM
// node bounds (world coords), so it's exact regardless of node heights.
function wfFit(){
  const canvas=$("wf-canvas"); if(!canvas) return;
  const els=[...document.querySelectorAll("#wf-world .wf-node")];
  if(!els.length){ wfPan={x:0,y:0}; wfSetZoom(1); return; }
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  els.forEach(el=>{ const x=el.offsetLeft,y=el.offsetTop,w=el.offsetWidth,h=el.offsetHeight;
    if(x<minX)minX=x; if(y<minY)minY=y; if(x+w>maxX)maxX=x+w; if(y+h>maxY)maxY=y+h; });
  const pad=70, cw=canvas.clientWidth, ch=canvas.clientHeight;
  const z=Math.max(0.2, Math.min(cw/((maxX-minX)+pad*2), ch/((maxY-minY)+pad*2), 1.5));
  wfZoom=z;
  wfPan.x=(cw-(minX+maxX)*z)/2;
  wfPan.y=(ch-(minY+maxY)*z)/2;
  wfApplyTransform();
}

function wfDefaults(type){

    if(f.t==="tpls"){ p[f.k]= Array.isArray(f.d)?f.d.slice():[]; return; }  // fresh array per node

function wfNode(id){ const g=wfGraph(); return g?g.nodes.find(n=>n.id===id):null; }
function wfNewNode(type,x,y){ return {id:wfUid(),type,x,y,params:wfDefaults(type),note:"",log:"",showPreview:false,stack:null}; }
function wfNewGraph(){ return { nodes:[{id:wfUid(),type:"start",x:60,y:70,params:{}}], edges:[], groups:[] }; }

// ── Merge / stack blocks ─────────────────────────────────────────────────────
// A "merged" block is a vertical stack of single-in/single-out nodes shown flush
// and moved as one. Membership is a shared `node.stack` id; their order is the
// REAL sequential edges between them, so the engine runs them in order with no
// special-casing. Drop a block just above/below another to merge; right-click →
// "Bỏ merge" to split. Only action/call nodes (one in, one out) can merge.
const wfStackId=()=>"st"+Math.random().toString(36).slice(2,8);
function wfMergeable(n){ const d=n&&WF_NODES[n.type]; return !!d && (d.kind==="action"||d.kind==="call"); }
function wfStackMembers(sid){ const g=wfGraph(); return g?g.nodes.filter(n=>n.stack===sid):[]; }
function wfSameStack(aId,bId){ const a=wfNode(aId),b=wfNode(bId); return !!(a&&b&&a.stack&&a.stack===b.stack); }
function wfHasInternalIn(n){ const g=wfGraph(); return !!(g&&n.stack&&g.edges.some(e=>e.to===n.id&&wfSameStack(e.from,e.to))); }
function wfHasInternalOut(n){ const g=wfGraph(); return !!(g&&n.stack&&g.edges.some(e=>e.from===n.id&&wfSameStack(e.from,e.to))); }
function wfStackChain(sid){
  const g=wfGraph(); if(!g) return [];
  const members=g.nodes.filter(n=>n.stack===sid); if(!members.length) return [];
  const byId=new Map(members.map(n=>[n.id,n]));
  const head=members.find(n=>!g.edges.some(e=>e.to===n.id&&byId.has(e.from)))||members[0];
  const chain=[]; const seen=new Set(); let cur=head;
  while(cur&&!seen.has(cur.id)){ seen.add(cur.id); chain.push(cur);
    const e=g.edges.find(ed=>ed.from===cur.id&&byId.has(ed.to)&&!seen.has(ed.to)); cur=e?byId.get(e.to):null; }
  members.forEach(m=>{ if(!seen.has(m.id)) chain.push(m); });   // stragglers (defensive)
  return chain;
}
// Lay every stack out flush: members snap under the head with borders touching.
// Called after each canvas render (nodes must be in the DOM to measure heights).
function wfReflowStacks(){
  const g=wfGraph(); if(!g) return;
  const sids=[...new Set(g.nodes.filter(n=>n.stack).map(n=>n.stack))];
  for(const sid of sids){
    const chain=wfStackChain(sid);
    if(chain.length<2) continue;   // a lone survivor is dissolved on delete, not here
    const x=chain[0].x; let y=chain[0].y;
    for(const n of chain){
      n.x=x; n.y=y;
      const el=document.querySelector(`.wf-node[data-node="${n.id}"]`);
      if(el){ el.style.left=x+"px"; el.style.top=y+"px"; }
      y += (el?el.offsetHeight:46)-1;   // -1 so adjacent borders overlap into one
    }
  }
}
// Insert dragged node D adjacent to target T ("after" = below, "before" = above),
// rewiring so the surrounding chain stays intact, then tag both into one stack.
function wfMergeInsert(dragId, targetId, where){
  const g=wfGraph(); if(!g) return;
  const D=wfNode(dragId), T=wfNode(targetId); if(!D||!T) return;
  g.edges=g.edges.filter(e=>e.from!==dragId&&e.to!==dragId);   // D starts free
  const sid=T.stack||wfStackId(); T.stack=sid; D.stack=sid;
  if(where==="after"){
    const oe=g.edges.find(e=>e.from===targetId);              // T's old successor
    const tgt=oe?oe.to:null, tgtPort=oe?(oe.toPort||"in"):"in";
    if(oe) g.edges=g.edges.filter(e=>e!==oe);
    g.edges.push({from:targetId,fromPort:"out",to:dragId,toPort:"in"});
    if(tgt&&tgt!==dragId) g.edges.push({from:dragId,fromPort:"out",to:tgt,toPort:tgtPort});
  } else {
    g.edges.filter(e=>e.to===targetId&&(e.toPort||"in")==="in").forEach(e=>{ e.to=dragId; });
    g.edges.push({from:dragId,fromPort:"out",to:targetId,toPort:"in"});
  }
  wfSelectOne(dragId); wfRenderCanvas(); wfRenderInspector();
  setStatus("Đã gộp khối");
}
// Find where a lone dragged block would merge: the nearest mergeable block whose
// top/bottom edge it landed flush against. Returns {target, where} or null.
function wfFindMergeTarget(dragId){
  const g=wfGraph(); if(!g) return null;
  const D=wfNode(dragId); if(!D||D.stack||!wfMergeable(D)) return null;
  const dEl=wfNodeElById(dragId); if(!dEl) return null;
  const dh=dEl.offsetHeight, dcx=D.x+dEl.offsetWidth/2;
  let best=null, bestWhere=null, bestScore=Infinity;
  for(const T of g.nodes){
    if(T.id===dragId||!wfMergeable(T)) continue;
    const tEl=wfNodeElById(T.id); if(!tEl) continue;
    const th=tEl.offsetHeight, tcx=T.x+tEl.offsetWidth/2;
    const dxc=Math.abs(dcx-tcx); if(dxc>80) continue;             // must roughly line up
    const gapBelow=Math.abs(D.y-(T.y+th));                        // D sits under T
    const gapAbove=Math.abs((D.y+dh)-T.y);                        // D sits over T
    if(gapBelow<=30 && !wfHasInternalOut(T)){                     // append after a tail
      const s=gapBelow+dxc*0.25; if(s<bestScore){bestScore=s;best=T;bestWhere="after";} }
    if(gapAbove<=30 && !wfHasInternalIn(T)){                      // prepend before a head
      const s=gapAbove+dxc*0.25; if(s<bestScore){bestScore=s;best=T;bestWhere="before";} }
  }
  return best?{target:best, where:bestWhere}:null;
}
// On drop, merge the dragged block into the candidate target (if any).
function wfTryMerge(dragId){
  const c=wfFindMergeTarget(dragId);
  if(c){ wfMergeInsert(dragId, c.target.id, c.where); return true; }
  return false;
}
// Live preview while dragging: outline the edge the block will snap onto.
function wfClearMergeHint(){
  document.querySelectorAll(".wf-merge-top,.wf-merge-bot")
    .forEach(el=>el.classList.remove("wf-merge-top","wf-merge-bot"));
}
function wfShowMergeHint(dragId){
  wfClearMergeHint();
  const c=wfFindMergeTarget(dragId); if(!c) return;
  const el=wfNodeElById(c.target.id); if(el) el.classList.add(c.where==="after"?"wf-merge-bot":"wf-merge-top");
}
// Split a stack: clear membership (edges kept so the flow still runs) and spread
// the blocks apart so each is independently editable again.
function wfUnmerge(sid){
  const g=wfGraph(); if(!g) return;
  const chain=wfStackChain(sid); if(!chain.length) return;
  const x=chain[0].x; let y=chain[0].y;
  chain.forEach(n=>{ n.stack=null; });
  chain.forEach(n=>{ const el=document.querySelector(`.wf-node[data-node="${n.id}"]`);
    n.x=x; n.y=y; y += (el?el.offsetHeight:46)+26; });
  wfRenderCanvas(); wfRenderInspector();
  setStatus("Đã bỏ merge");
}

// ── Sidebar drag-to-reorder (activities + functions) ─────────────────────────
// Dragging is armed only while the grip handle is held, so checkbox / select /
// delete clicks keep working. Rows shuffle live during dragover; on drop the
// backing array (WF.activities or WF.functions) is reordered to match the DOM —
// for sequence activities this changes their run order.
const WF_GRIP = `<svg width="8" height="13" viewBox="0 0 9 14" fill="currentColor"><circle cx="2" cy="2" r="1.3"/><circle cx="7" cy="2" r="1.3"/><circle cx="2" cy="7" r="1.3"/><circle cx="7" cy="7" r="1.3"/><circle cx="2" cy="12" r="1.3"/><circle cx="7" cy="12" r="1.3"/></svg>`;

// `paletteType` (optional): if set, the row also acts like a palette chip — it's
// draggable from anywhere and dropping it on the canvas spawns that node (used by
// the Function list so a function can be dragged straight onto the graph).
function wfAttachReorder(el, handle, listEl, arr, paletteType){
  if(paletteType){ el.draggable=true; }                     // drag from anywhere
  else if(handle){
    handle.addEventListener("mousedown", ()=>{ el.draggable=true; });
    handle.addEventListener("mouseup",   ()=>{ el.draggable=false; });
  } else return;
  el.addEventListener("dragstart", e=>{
    el.classList.add("wf-dragging");
    if(paletteType){ wfPaletteDrag=paletteType; e.dataTransfer.effectAllowed="copyMove";
      try{ e.dataTransfer.setData("text/plain", paletteType); }catch{} }
    else { e.dataTransfer.effectAllowed="move";
      try{ e.dataTransfer.setData("text/plain", el.dataset.id); }catch{} }
  });
  el.addEventListener("dragend", ()=>{
    if(!paletteType) el.draggable=false;
    el.classList.remove("wf-dragging");
    if(paletteType) wfPaletteDrag=null;
    wfCommitReorder(listEl, arr);
  });
}

function wfDragAfter(listEl, y){
  const rows=[...listEl.querySelectorAll(".wf-act:not(.wf-dragging)")];
  let closest=null, closestOff=Number.NEGATIVE_INFINITY;
  for(const r of rows){
    const box=r.getBoundingClientRect();
    const off=y-box.top-box.height/2;
    if(off<0 && off>closestOff){ closestOff=off; closest=r; }
  }
  return closest;
}

function wfSetupSortable(listEl){
  listEl.addEventListener("dragover", e=>{
    const dragging=listEl.querySelector(".wf-dragging");
    if(!dragging) return;   // only react to a drag that started in THIS list
    e.preventDefault();
    e.dataTransfer.dropEffect="move";
    const after=wfDragAfter(listEl, e.clientY);
    if(after==null) listEl.appendChild(dragging);
    else listEl.insertBefore(dragging, after);
  });
}

function wfCommitReorder(listEl, arr){
  const ids=[...listEl.querySelectorAll(".wf-act")].map(e=>e.dataset.id);
  arr.sort((a,b)=> ids.indexOf(a.id) - ids.indexOf(b.id));
  wfRenderAll();
}

function wfChip(ico,label,dragType){
  const chip=document.createElement("div"); chip.className="wf-chip"; chip.draggable=true;
  chip.innerHTML=`<span class="ico">${ico}</span>${escHtml(label)}`;
  chip.addEventListener("dragstart",e=>{ wfPaletteDrag=dragType; e.dataTransfer.effectAllowed="copy"; try{e.dataTransfer.setData("text/plain",dragType);}catch{} });

  return chip;

function wfRenderCanvas(){
  const world=$("wf-world"), empty=$("wf-canvas-empty"), g=wfGraph();
  [...world.querySelectorAll(".wf-node,.wf-group")].forEach(n=>n.remove());
  wfApplyTransform();
  if(!g){ empty.style.display="flex"; $("wf-wires").innerHTML=""; return; }
  empty.style.display="none";
  wfRenderGroups();   // frames behind the nodes
  g.nodes.forEach(n=>world.appendChild(wfNodeEl(n)));
  wfReflowStacks();   // snap merged blocks flush (needs nodes in the DOM)
  wfDrawWires();
  if(wfRunning||wfRunStopped) wfReapplyRunViz();   // keep the run-trail across redraws (live + after stop)
  wfRenderVarsPanel();
}

// ── Variables panel (bottom-right of canvas) ──────────────────────────────────
// Collect every variable the user can reference: declared on the current
// activity (with their declared default), plus any live values the engine has
// pushed during a test run. Live values override declared defaults.
function wfDeclaredVars(){
  const out={};
  // Globals first (declared at flow level, visible everywhere).
  (WF.globals||[]).forEach(v=>{ const nm=(v.name||"").trim(); if(nm) out[nm]=v.value; });
  const act=wfCurAct();
  if(act && Array.isArray(act.vars)){
    act.vars.forEach(v=>{ const nm=(v.name||"").trim(); if(nm) out[nm]=v.value; });
  }
  return out;
}
// All known variable names across the whole flow (every activity + functions),
// so a dropdown in any graph can offer vars declared elsewhere too. Sources:
//   1. Global vars (declared at flow top level — visible in every activity).
//   2. Vars explicitly declared on an activity (the "Biến" section).
//   3. Vars produced by nodes — set_var / calc_var / read_var / parse_var each
//      write a var via their "name" field, so we treat those names as known
//      defaults every other block can reference. Sort alphabetically.
const WF_VAR_PRODUCERS = {"set_var":"name","calc_var":"name","read_var":"name","parse_var":"name"};
function wfGraphVarNames(g){
  const s=new Set();
  (g && g.nodes || []).forEach(n=>{
    const k=WF_VAR_PRODUCERS[n.type];
    if(k){ const nm=String((n.params||{})[k]||"").trim(); if(nm) s.add(nm); }
  });
  return s;
}
function wfAllVarNames(){
  const s=new Set();
  (WF.globals||[]).forEach(v=>{ const n=(v.name||"").trim(); if(n)s.add(n); });
  (WF.activities||[]).forEach(a=>{ (a.vars||[]).forEach(v=>{ const n=(v.name||"").trim(); if(n)s.add(n); }); });
  // Vars produced by nodes anywhere in the flow count as defaults too.
  (WF.activities||[]).forEach(a=>{ wfGraphVarNames(a.graph).forEach(n=>s.add(n)); });
  (WF.functions||[]).forEach(fn=>{ wfGraphVarNames(fn.graph).forEach(n=>s.add(n)); });
  return [...s].sort();
}
function wfRenderVarsPanel(){
  const panel=$("wf-vars-panel"); if(!panel) return;
  const body=$("wf-vars-body"); if(!body) return;
  panel.classList.toggle("collapsed", wfVarsCollapsed);
  panel.classList.toggle("live", Object.keys(wfLiveVars).length>0);
  const declared=wfDeclaredVars();
  // Names: globals first (in declared order), then activity-declared, then
  // node-produced vars in the current graph, then extra live-only keys.
  const globalNames=[]; (WF.globals||[]).forEach(v=>{ const n=(v.name||"").trim(); if(n) globalNames.push(n); });
  const actDeclared={}; const act=wfCurAct(); (act&&act.vars||[]).forEach(v=>{ const n=(v.name||"").trim(); if(n&&!globalNames.includes(n)) actDeclared[n]=v.value; });
  const names=[...globalNames, ...Object.keys(actDeclared)];
  const g=wfGraph();
  wfGraphVarNames(g).forEach(n=>{ if(!names.includes(n)) names.push(n); });
  Object.keys(wfLiveVars).forEach(n=>{ if(!names.includes(n)) names.push(n); });
  const globalSet=new Set(globalNames);
  body.innerHTML="";
  if(!names.length){
    const e=document.createElement("div"); e.className="wf-vars-empty";
    e.textContent="Chưa có biến nào. Bấm + để thêm biến toàn cục.";
    body.appendChild(e); return;
  }
  names.forEach(n=>{
    const row=document.createElement("div"); row.className="wf-var-row-live";
    const nm=document.createElement("span"); nm.className="vn"; nm.textContent=(globalSet.has(n)?"⏺ ":"")+n; nm.title=n+(globalSet.has(n)?" · toàn cục":"");
    if(globalSet.has(n)) nm.style.color="var(--accent)";
    const live=wfLiveVars[n];
    const hasDeclared=declared.hasOwnProperty(n);
    const val = (live!==undefined) ? live : (hasDeclared ? declared[n] : undefined);
    const vv=document.createElement("span"); vv.className="vv"+(n===wfFreshVar?" fresh":"");
    vv.textContent = (val===undefined||val===null||val==="") ? (hasDeclared?"∅":"(tự sinh)") : String(val);
    vv.title = (live!==undefined) ? "giá trị chạy" : (hasDeclared ? "giá trị khai báo" : "do node tạo — chưa có giá trị mặc định");
    row.appendChild(nm); row.appendChild(vv);
    body.appendChild(row);
  });
}
