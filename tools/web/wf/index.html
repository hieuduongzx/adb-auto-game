<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Workflow2k</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/wf.css">
</head>
<body>
<div id="app">

<div id="toolbar" class="card">
  <div class="device-wrap" title="Thiết bị đang kết nối">
    <span id="device-dot"></span>
    <select id="device-select" onchange="onDeviceChange(this.value)">
      <option value="">Đang quét…</option>
    </select>
    <svg width="10" height="6" viewBox="0 0 12 7" fill="#9aa3ae" style="flex-shrink:0;pointer-events:none;"><path d="M0 0l6 7 6-7z"/></svg>
  </div>
  <div class="tb-group">
    <button class="btn sm ico" onclick="onRefreshDevices()" title="Làm mới — quét lại thiết bị đã kết nối">
      <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.5 9a9 9 0 0 1 14.9-3.4L23 10M1 14l4.6 4.4A9 9 0 0 0 20.5 15"/></svg></button>
    <button class="btn sm ico" onclick="onScanPorts()" title="Quét cổng — dò mọi cổng giả lập đã biết">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
    <button class="btn sm ico" onclick="onRestartAdb()" title="Khởi động lại ADB server">
      <svg viewBox="0 0 24 24"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg></button>
  </div>
  <span class="tb-divider"></span>
  <button class="btn" onclick="openDevHelper()" title="DevScope — chụp/đo region, ảnh lưu thẳng vào templates của workflow hiện tại">
    <svg width="15" height="15" viewBox="0 0 24 24"><path d="M14.7 6.3a4 4 0 0 0-5.4 5.3L3 18l3 3 6.4-6.3a4 4 0 0 0 5.3-5.4l-2.6 2.6-2.5-.4-.4-2.5z"/></svg>DevScope</button>
  <div class="device-wrap" title="Nguồn ảnh dùng cho Chạy thử, screenshot, OCR và khớp mẫu · scrcpy nhanh/headless · ADB screencap ổn định" style="max-width:172px;">
    <span style="font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap;">Nguồn ảnh</span>
    <select id="capture-backend" onchange="onCaptureBackendChange(this.value)">
      <option value="scrcpy">scrcpy (nhanh)</option>
      <option value="adb">ADB screencap</option>
    </select>
  </div>
  <span class="spacer"></span>
  <div class="tb-group">
    <button class="btn ico" onclick="wfNew()" title="Mới — tạo workflow trống">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="12" x2="12" y2="18"/><line x1="9" y1="15" x2="15" y2="15"/></svg></button>
    <button class="btn ico" onclick="wfImport()" title="Mở… — workflow từ file JSON">
      <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></button>
    <button class="btn accent ico" id="wf-save-btn" onclick="wfSave()" title="Lưu vào file đang mở (Ctrl+S)">
      <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg></button>
    <button class="btn ico" onclick="wfExport()" title="Lưu thành… — file JSON mới">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
  </div>
  <span class="tb-divider"></span>
  <div class="tb-group">
    <button class="btn ok ico" id="wf-run-btn" onclick="wfToggleRun()" title="Chạy thử"></button>
    <button class="btn ico" onclick="wfRunGui()" title="Chạy GUI — mở Runner với workflow hiện tại">
      <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></button>
  </div>
</div>

<div id="workflow-view" style="display:flex;">
  <!-- Left: node palette only (activities + functions moved into the canvas) -->
  <div id="wf-side" class="card">
    <div class="wf-side-sec" style="flex:1;min-height:0;display:flex;flex-direction:column;">
      <div class="wf-side-hdr"><span>Node</span></div>
      <div id="wf-palette" class="wf-palette"></div>
    </div>
  </div>
  <div id="wf-side-resizer" title="Kéo để đổi độ rộng cột trái"></div>
  <!-- Center: graph canvas -->
  <div id="wf-main" class="card">
    <div id="wf-bar">
      <input id="wf-name" type="text" placeholder="Tên workflow" value="My Workflow">
      <span class="wf-cur-act" id="wf-cur-act">—</span>
      <button class="btn sm ico" id="wf-snap-btn" onclick="wfToggleSnap()" title="Bám lưới: Tắt">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg></button>
      <button class="btn sm ico" id="wf-preview-btn" onclick="wfTogglePreview()" title="Preview ảnh: Tắt">
        <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
      <button class="btn sm ico" id="wf-group-btn" onclick="wfToggleGroupMode()" title="Tạo nhóm: Tắt — bấm rồi kéo để vẽ khung (hoặc chọn vài node trước rồi bấm)">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2" stroke-dasharray="4 3"/></svg></button>
      <span class="tb-divider"></span>
      <div id="wf-speed-group" class="wf-speed-group" title="Speed hack — tách riêng khỏi Chạy thử">
        <span class="wf-speed-title">Speed hack</span>
        <button class="btn sm ico" id="wf-speed-btn" onclick="wfToggleSpeed()" title="Speed hack: Tắt (tăng tốc game bằng Frida — cần root)">
          <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></button>
        <input id="wf-speed-val" type="number" min="0.1" step="0.1" value="2" title="Tốc độ (x)" style="width:48px;text-align:right" onchange="wfSpeedChanged()">
        <span class="hz-unit">x</span>
        <input id="wf-speed-pkg" type="text" placeholder="package game" title="Package game để inject speedhack" style="width:150px" onchange="wfSpeedFromUI()">
        <button class="btn sm ico ok" id="wf-speed-run-btn" onclick="wfSpeedRun()" title="Bật speed hack" style="display:none"></button>
      </div>
      <span class="tb-divider"></span>
      <span class="wf-zoom">
        <button class="btn sm" onclick="wfZoomBy(1/1.1)" title="Thu nhỏ">−</button>
        <span id="wf-zoom-lbl" onclick="wfZoomReset()" title="Đặt lại 100%">100%</span>
        <button class="btn sm" onclick="wfZoomBy(1.1)" title="Phóng to">+</button>
        <button class="btn sm ico" onclick="wfFit()" title="Vừa khung — hiện toàn bộ block (F)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 3 4 3 4 8"/><polyline points="16 3 20 3 20 8"/><polyline points="8 21 4 21 4 16"/><polyline points="16 21 20 21 20 16"/></svg></button>
      </span>
      <span class="spacer"></span>
      <span class="wf-hint" title="Cuộn chuột = zoom · Kéo = di chuyển khối · Chuột phải = menu (tạo nhóm/sao chép/xoá) hoặc xoá dây (trên dây nối) · Space hoặc chuột giữa = kéo nền">Cuộn = zoom · Kéo = di chuyển · Chuột phải = menu · Space = kéo nền</span>
    </div>
    <div id="wf-canvas">
      <div id="wf-world">
        <svg id="wf-wires"></svg>
      </div>
      <div id="wf-canvas-empty" class="wf-empty-note">Chọn hoặc thêm một hoạt động để mở canvas.</div>
      <div id="wf-vars-panel" class="wf-vars-panel">
        <div class="wf-vars-hdr">
          <span class="wf-vars-title">Biến</span>
          <span class="wf-vars-count" id="wf-vars-count"></span>
          <span class="wf-vars-live" id="wf-vars-live" title="● Live — engine đang chạy">●</span>
          <span class="wf-vars-actions">
            <button id="wf-vars-add" class="wf-vars-add" title="Thêm biến toàn cục">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <button id="wf-vars-mgr" class="wf-vars-add" title="Quản lý biến toàn cục"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 13.5a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-2.9 1.2V20a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-2.9-1.2l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0-1.2-2.9H4a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.2-2.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3 1.7 1.7 0 0 0 1-1.5V4a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 2.9 1.2l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.5 1H20a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg></button>
          </span>
        </div>
        <div id="wf-vars-body" class="wf-vars-body"></div>
      </div>
      <!-- Activities + Functions panel — pinned bottom-right of the canvas.
           Title row (chevron + label + add btn) + tab bar stacked in the header. -->
      <div id="wf-act-panel" class="wf-act-panel">
        <div class="wf-act-panel-hdr">
          <div class="wf-act-hdr-row" id="wf-act-hdr-row">
            <span class="wf-act-hdr-chevron">
              <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 4.5L6 8l3.5-3.5"/></svg>
            </span>
            <span class="wf-act-hdr-title" id="wf-act-hdr-title">Hoạt động</span>
            <button class="wf-act-hdr-add" id="wf-act-add" title="Thêm hoạt động">+</button>
          </div>
          <div class="wf-act-tab-row">
            <button class="wf-act-tab sel" data-tab="acts" id="wf-tab-acts">Hoạt động <span class="side-count" id="wf-act-count"></span></button>
            <button class="wf-act-tab" data-tab="fns" id="wf-tab-fns">Function <span class="side-count" id="wf-fn-count"></span></button>
          </div>
        </div>
        <div class="wf-act-panel-body">
          <div id="wf-activities" class="wf-act-list"></div>
          <div id="wf-functions" class="wf-act-list" style="display:none"></div>
        </div>
      </div>
      <!-- Auto-layout toolbar — pinned bottom-left of the canvas. One button per
           layout strategy; each tidies the whole graph then fits it to view. -->
      <div id="wf-layout-bar" class="wf-layout-bar">
        <button class="wf-layout-btn" data-layout="vertical" title="Xếp dọc — luồng từ trên xuống">⬇</button>
        <button class="wf-layout-btn" data-layout="horizontal" title="Xếp ngang — luồng từ trái sang">➡</button>
        <button class="wf-layout-btn" data-layout="tree" title="Xếp cây — rẽ nhánh trải ra">⌥</button>
        <button class="wf-layout-btn" data-layout="compact" title="Xếp gọn — tối thiểu khoảng cách">◫</button>
      </div>
    </div>
  </div>
  <div id="wf-insp-resizer" title="Kéo để đổi độ rộng cột phải"></div>
  <!-- Right: inspector -->
  <div id="wf-inspector" class="card" style="width:280px;">
    <div class="wf-side-hdr"><span>Thuộc tính</span></div>
    <div id="wf-insp-body"></div>
  </div>
</div>
<div id="wf-ctxmenu"></div>


<div id="log-card" class="card">
  <div class="log-hdr" onclick="wfToggleLog(event)" title="Bấm để thu gọn/mở nhật ký">
    <span class="log-chevron"><svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 4.5L6 8l3.5-3.5"/></svg></span>
    <span class="log-label">Nhật ký</span>
    <span class="log-count" id="log-count"></span>
    <span class="spacer"></span>
    <button class="btn-log-clear" onclick="onClearLog(event)">Xoá</button>
  </div>
  <div class="log-body" id="log-body"></div>
</div>

<!-- ── Footer ────────────────────────────────────────────────────────────── -->

<div id="footer">
  <span id="footer-dot"></span>
  <span id="status-text">Sẵn sàng</span>
  <span class="spacer"></span>
  <span id="footer-out" style="font-size:11px;color:var(--log-muted);font-family:var(--mono);">workflow → data/flows/</span>
</div>

</div><!-- /app -->

<script src="js/base.js"></script>
<script src="js/events.js"></script>
<script src="js/keyboard.js"></script>
<script src="js/workflow.js"></script>
<script src="js/layout.js"></script>
<script src="js/edit.js"></script>
<script src="js/render.js"></script>
<script src="js/selection.js"></script>
<script src="js/wires.js"></script>
<script src="js/groups.js"></script>
<script src="js/inspector.js"></script>
<script src="js/io.js"></script>
</body>
</html>
